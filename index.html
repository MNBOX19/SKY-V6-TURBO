<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0F1C">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>R&C SMARTERS PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg-deep:#0A0F1C;--main-color:#00A8FF;--font-xs:1.8vh;--font-sm:2.2vh;--font-md:3vh;--font-lg:5vh}
        *{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        html,body{background:var(--bg-deep);color:#fff;font-family:'Montserrat',sans-serif;position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;overflow:hidden!important;overscroll-behavior:none;touch-action:none}
        .theme-text{color:var(--main-color)}
        #splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-deep);z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .splash-logo{font-size:8vh;font-weight:900;letter-spacing:2px;text-align:center}
        .hide{display:none!important}
        .flex-center{display:flex;align-items:center;justify-content:center;flex-direction:column}
        .layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;background:var(--bg-deep);overflow:hidden}
        button,.smart-card,.cat-item,.item,.power-btn,.key,.toggle-btn,.menu-card,.menu-btn,.menu-power-btn,.grid-item,.ep-item{cursor:pointer}
        .focused{border:3px solid #fff!important;background:var(--main-color)!important;color:#000!important;z-index:50}
        .focused i,.focused span,.focused div{color:#000!important}
        .grid-item.focused{background:#222!important;border-color:var(--main-color)!important}
        .grid-item.focused .title{color:var(--main-color)!important}
        #vid-box.focused{border:4px solid var(--main-color)!important;background:transparent!important}
        #vid-box.fs,#vid-box.fs.focused{border:none!important;width:100vw!important;height:100vh!important;z-index:999999!important;position:fixed!important;top:0!important;left:0!important;background:#000!important;display:block!important}
        .login-box{width:450px;max-width:90%;padding:40px;background:rgba(0,0,0,0.4);border:2px solid var(--main-color);border-radius:12px;text-align:center}
        .logo-txt{font-size:4.5vh;font-weight:900;margin-bottom:2.5vh;text-align:center}
        .inp{width:100%;padding:16px;margin:10px 0;background:#1a1a1a;border:1px solid #333;color:#fff;text-align:center;font-weight:600;border-radius:8px;font-size:16px}
        .btn{width:100%;padding:16px;margin-top:20px;background:var(--main-color);color:#000;border:none;font-weight:900;border-radius:8px;font-size:16px}
        .menu-top-bar{position:absolute;top:6vh;left:8vw;width:84vw;display:flex;justify-content:space-between;align-items:center;z-index:10}
        .menu-top-left{display:flex;align-items:center}
        .menu-date{font-size:2.6vh;font-weight:normal;color:#eee;margin-left:20px}
        .menu-power-btn{width:auto;height:auto;padding:1vh;border:none;background:transparent!important;display:flex;align-items:center;justify-content:center}
        .menu-power-btn i{font-size:4.5vh;color:#fff}
        .menu-power-btn.focused{border:none!important;background:transparent!important}
        .menu-power-btn.focused i{color:var(--main-color)!important}
        .menu-center-wrapper{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .smarters-grid{display:flex;width:84vw;height:58vh}
        .smarters-left{flex:0 0 32%;display:flex;margin-right:2vw}
        .smarters-right{flex:1;display:flex;flex-direction:column}
        .smarters-right-top{flex:1;display:flex;margin-bottom:2vh}
        .smarters-right-bottom{height:9vh;display:flex}
        .smarters-right-top>div:first-child{margin-right:2vw}
        .smarters-right-bottom>div:first-child{margin-right:2vw}
        .menu-card{flex:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid transparent}
        #m0{background:#3e51e0}#m1{background:#f72c5b}#m2{background:#4891db}
        #m0.focused{background:#3e51e0!important}#m1.focused{background:#f72c5b!important}#m2.focused{background:#4891db!important}
        .menu-card .card-icon{font-size:9vh;margin-bottom:1.5vh;color:#fff}
        .menu-card .card-title{font-size:3.5vh;font-weight:800;letter-spacing:1px;color:#fff;text-transform:uppercase}
        .menu-btn{flex:1;background:#6b9e76;border:3px solid transparent;border-radius:8px;font-weight:bold;font-size:2.6vh;color:#fff;display:flex;align-items:center;justify-content:center}
        .menu-btn i{margin-right:1vw;font-size:3vh}
        .menu-btn.focused{background:#6b9e76!important;border-color:#fff!important;color:#fff!important}
        .menu-btn.focused i{color:#fff!important}
        .menu-footer{position:absolute;bottom:6vh;left:8vw;width:84vw;display:flex;justify-content:space-between;font-size:2.6vh;color:#fff;font-weight:normal;z-index:10}
        .menu-card.focused{border:3px solid #fff!important}
        .menu-card.focused .card-icon,.menu-card.focused .card-title{color:#fff!important}
        .config-row{display:flex;margin:2vh 0;width:100%}
        .toggle-btn{flex:1;margin:0 0.5vw;padding:1.5vh;background:#1a1a1a;border:1px solid #333;color:#888;font-size:var(--font-sm);font-weight:800;border-radius:1vh}
        .info-row{display:flex;justify-content:space-between;padding:1vh 0;border-bottom:1px solid #222;font-size:var(--font-sm);color:#ccc}
        #content-layer{display:flex;width:100%;height:100%;background:var(--bg-deep);overflow:hidden}
        .col-cat{width:25%;background:rgba(0,0,0,0.4);display:flex;flex-direction:column;border-right:2px solid rgba(255,255,255,0.05);height:100%;overflow:hidden}
        .col-list{width:35%;background:rgba(0,0,0,0.2);display:flex;flex-direction:column;border-right:2px solid rgba(255,255,255,0.05);height:100%;overflow:hidden}
        .col-play{flex:1;display:flex;flex-direction:column;position:relative;background:transparent;height:100%;overflow:hidden}
        .mode-grid .col-cat{width:20%}
        .mode-grid .col-list{width:80%;border-right:none}
        .mode-grid .col-play{display:none}
        .cat-head{padding:15px;background:rgba(0,0,0,0.6);color:var(--main-color);border-bottom:2px solid rgba(255,255,255,0.05);text-align:center;font-size:var(--font-md);font-weight:900;flex-shrink:0}
        .cat-top-row{display:flex;align-items:center;width:100%}
        .cat-title-txt{flex:1;text-align:center}
        .cat-list,.item-list,.grid-view{flex:1;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
        .cat-item,.item{padding:14px 20px;border-radius:6px;margin:6px 12px;color:#888;font-size:var(--font-sm);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent}
        .cat-item.active{background:rgba(255,255,255,0.1);color:#fff;border-left:4px solid var(--main-color)}
        .item{border-bottom:1px solid rgba(255,255,255,0.05)}
        .item.playing{color:var(--main-color);background:rgba(0,0,0,0.5);border-left:4px solid var(--main-color)}
        .fav-icon{float:right;color:var(--main-color)}
        .search-area{padding:15px;background:rgba(0,0,0,0.5);border-bottom:2px solid rgba(255,255,255,0.05);flex-shrink:0}
        .inp-search{width:100%;padding:12px;background:#111;border:1px solid #333;color:#fff;font-size:var(--font-sm);font-weight:bold;border-radius:6px;text-transform:uppercase;text-align:center}
        .grid-view{display:block;padding:20px;text-align:left}
        .grid-item{display:inline-block;vertical-align:top;width:18%;margin:0 1% 15px 1%;text-align:center;border:3px solid transparent;border-radius:6px;padding:5px;background:rgba(0,0,0,0.3)}
        .grid-item img{width:100%;height:auto;object-fit:contain;border-radius:4px;background:#000}
        .grid-item .title{width:100%;font-size:1.6vh;color:#fff;margin-top:8px;text-align:center;white-space:normal;overflow:visible;line-height:1.2;font-weight:800}
        .vid-box{width:100%;height:50vh;background:#000;position:relative;border-bottom:2px solid rgba(255,255,255,0.05);overflow:hidden;flex-shrink:0}
        #player-container{width:100%;height:100%;background:#000}
        video{width:100%;height:100%;object-fit:fill;background:#000;z-index:1}
        .buffer-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center}
        .buffer-spinner{font-size:8vh;color:var(--main-color)}
        #pause-layer{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9000;align-items:center;justify-content:center;pointer-events:none}
        .meta{padding:25px;flex:1;height:100%;overflow-y:auto;background:rgba(0,0,0,0.2);display:flex;flex-direction:column}
        .meta-title{font-size:var(--font-lg);color:var(--main-color);font-weight:900;margin-bottom:1vh}
        .meta-desc{font-size:var(--font-sm);color:#999;margin-bottom:1vh}
        .keys{display:flex;justify-content:space-between;align-items:center;padding-top:2vh;border-top:2px solid rgba(255,255,255,0.05);margin-top:auto;flex-shrink:0}
        .key{flex:1;margin:0 0.5vw;font-size:var(--font-xs);color:#fff;font-weight:700;background:rgba(0,0,0,0.5);border:1px solid #333;padding:1.2vh 0.5vw;border-radius:0.8vh;display:flex;align-items:center;justify-content:center;white-space:nowrap}
        .key:first-child{margin-left:0}
        .key:last-child{margin-right:0}
        .dot{width:1.2vh;height:1.2vh;border-radius:50%;flex-shrink:0;margin-right:1.2vw}
        #episodes-layer{background:rgba(0,0,0,0.8);z-index:99999}
        .ep-modal{width:70%;height:90%;background:var(--bg-deep);border:2px solid var(--main-color);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
        .ep-header{padding:20px;text-align:center;font-size:3.5vh;font-weight:900;background:rgba(0,0,0,0.6);color:var(--main-color);border-bottom:2px solid rgba(255,255,255,0.05)}
        .ep-list{flex:1;overflow-y:auto;padding:20px}
        .ep-item{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:2.2vh;font-weight:700;color:#ccc;border-radius:6px}
        .ep-item.focused{background:var(--main-color)!important;color:#000!important;border:3px solid #fff!important}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:10px}
    </style>
</head>
<body onload="App.init()">
    <div id="splash-screen">
        <div class="splash-logo"><span style="color:#fff">R&amp;C</span> <span class="theme-text">SMARTERS PRO</span></div>
    </div>
    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box">
            <div class="logo-txt"><span style="color:#fff">R&amp;C</span> <span class="theme-text">SMARTERS PRO</span></div>
            <input type="text" id="i0" class="inp focusable" placeholder="DNS (Ex: meudns.com)" autocomplete="off">
            <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO" autocomplete="off">
            <input type="password" id="i2" class="inp focusable" placeholder="SENHA" autocomplete="off">
            <button id="i3" class="btn focusable" onclick="App.login(false)">ENTRAR AGORA</button>
            <div id="msg-login" style="color:var(--main-color); margin-top:20px; font-size:var(--font-sm); font-weight: 800;"></div>
        </div>
    </div>
    <div id="menu-layer" class="layer hide">
        <div class="menu-top-bar">
            <div class="menu-top-left">
                <div class="logo-txt" style="margin:0; font-size: 3.5vh;"><span style="color:#fff">R&amp;C</span> <span class="theme-text">SMARTERS PRO</span></div>
                <div id="menu-date" class="menu-date">--:--</div>
            </div>
            <div id="m3" class="menu-power-btn focusable" onclick="App.logout()">
                <i class="fas fa-power-off"></i>
            </div>
        </div>
        <div class="menu-center-wrapper">
            <div class="smarters-grid">
                <div class="smarters-left">
                    <div id="m0" class="menu-card focusable" onclick="App.openMode('live')">
                        <i class="fas fa-tv card-icon"></i>
                        <div class="card-title">TV AO VIVO</div>
                    </div>
                </div>
                <div class="smarters-right">
                    <div class="smarters-right-top">
                        <div id="m1" class="menu-card focusable" onclick="App.openMode('vod')">
                            <i class="fas fa-play-circle card-icon"></i>
                            <div class="card-title">FILMES</div>
                        </div>
                        <div id="m2" class="menu-card focusable" onclick="App.openMode('series')">
                            <i class="fas fa-clapperboard card-icon"></i>
                            <div class="card-title">SÉRIES</div>
                        </div>
                    </div>
                    <div class="smarters-right-bottom">
                        <div id="m4" class="menu-btn focusable" onclick="App.openSettings()" style="flex: 1;">
                            <i class="fas fa-user"></i> MINHA CONTA
                        </div>
                        <div style="flex: 1;"></div> 
                    </div>
                </div>
            </div>
        </div>
        <div class="menu-footer">
            <div id="menu-exp">Expiração: ...</div>
            <div id="menu-user">Usuário: ...</div>
        </div>
    </div>
    <div id="content-layer" class="layer hide">
        <div class="col-cat">
            <div class="cat-head">
                <div class="cat-top-row">
                    <div id="cat-title-txt" class="cat-title-txt">MENU</div>
                </div>
                <div id="item-count" style="font-size: 0.7em; margin-top: 5px; opacity: 0.7;">TOTAL: ...</div>
            </div>
            <div id="cat-list" class="cat-list"></div>
        </div>
        <div class="col-list">
            <div class="search-area"><input type="text" id="search" class="inp-search focusable" placeholder="BUSCAR..." autocomplete="off"></div>
            <div id="item-list" class="item-list"></div>
            <div id="grid-list" class="grid-view hide"></div>
        </div>
        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.handleVideoTap(event)">
                <div id="player-container">
                    <video id="player" playsinline webkit-playsinline></video>
                </div>
                <div id="smart-buffer" class="buffer-overlay"><i class="fas fa-circle-notch fa-spin buffer-spinner"></i></div>
                <div id="pause-layer"><i class="fas fa-pause" style="font-size: 10vh; color: rgba(255, 255, 255, 0.9);"></i></div>
            </div>
            <div class="meta">
                <div id="meta-title" class="meta-title"><span style="color:#fff">R&amp;C</span> <span class="theme-text">SMARTERS PRO</span></div>
                <div id="meta-desc" class="meta-desc"></div>
                <div class="keys">
                    <div class="key" id="key-fs"><div class="dot" style="background-color:#FF0000;"></div> TELA CHEIA</div>
                    <div class="key" id="key-top"><div class="dot" style="background-color:#00C851;"></div> TOPO</div>
                    <div class="key" id="key-search"><div class="dot" style="background-color:#ffbb33;"></div> BUSCAR</div>
                    <div class="key" id="key-menu"><div class="dot" style="background-color:#33b5e5;"></div> CONFIG.</div>
                </div>
            </div>
        </div>
    </div>
    <div id="episodes-layer" class="layer flex-center hide">
        <div class="ep-modal">
            <div id="ep-title" class="ep-header">EPISÓDIOS</div>
            <div id="ep-list" class="ep-list"></div>
        </div>
    </div>
    <div id="settings-layer" class="layer hide flex-center">
        <div class="login-box">
            <div class="logo-txt" id="set-title-txt"><i class="fas fa-user-shield" style="margin-right:10px; color: var(--main-color);"></i>MINHA <span class="theme-text">CONTA</span></div>
            <div class="info-row"><span id="lbl-set-u">USUÁRIO:</span> <span id="set-user">...</span></div>
            <div class="info-row"><span id="lbl-set-e">VENCIMENTO:</span> <span id="set-exp">...</span></div>
            <div class="info-row"><span id="lbl-set-c">TELAS:</span> <span id="set-conn">...</span></div>
            <div class="config-row" style="margin-top: 30px;"><div id="s0" class="toggle-btn focusable" style="border-color: #333; background: #111; cursor: default;">OPÇÕES</div></div>
            <div class="config-row">
                <div id="s1" class="toggle-btn focusable" onclick="App.toggleCfg('filter')"><span id="lbl-set-filter">XXX:</span> <span id="lbl-filter" style="color:#fff">NÃO</span></div>
            </div>
            <button id="s2" class="btn focusable" onclick="App.closeSettings()" style="background: #333; color: #fff; margin-top: 20px;">VOLTAR</button>
        </div>
    </div>
    <script>
        function safePlay(v){if(!v)return;try{var p=v.play();if(p!==undefined&&typeof p.catch==='function'){p.catch(function(e){});}}catch(e){}}
        function requestNativeFullscreen(e){var t=e||document.documentElement;try{if(t.requestFullscreen){var p=t.requestFullscreen();if(p!==undefined&&typeof p.catch==='function'){p.catch(function(){});}}else if(t.webkitRequestFullscreen){t.webkitRequestFullscreen();}}catch(e){}}
        var FavManager={key:'rc_favs_smart',list:[],init:function(){var s=localStorage.getItem(this.key);this.list=s?JSON.parse(s):[];},toggle:function(id){var idx=this.list.indexOf(id);if(idx>-1)this.list.splice(idx,1);else this.list.push(id);localStorage.setItem(this.key,JSON.stringify(this.list));if(App&&App.renderList)App.renderList();},isFav:function(id){return this.list.indexOf(id)>-1;}};
