<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>SKY GOLD</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* CSS exatamente como no HTML original (mantido na íntegra) */
        :root { --bg-deep: #000000; --main-color: #FFD700; --font-xs: 1.8vh; --font-sm: 2.2vh; --font-md: 3vh; --font-lg: 5vh; }
        * { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { background:#000; color:#fff; font-family:'Montserrat',sans-serif; position:fixed; top:0; left:0; right:0; bottom:0; width:100%; height:100%; overflow:hidden!important; overscroll-behavior:none; touch-action:none; transform:translate3d(0,0,0); backface-visibility:hidden; }
        .hide { display:none!important; }
        .flex-center { display:flex; align-items:center; justify-content:center; }
        .layer { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; background:transparent; overflow:hidden; }
        #splash-screen { position:fixed; top:0; left:0; right:0; bottom:0; background:#000; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.5s; }
        .splash-logo { font-size:10vh; font-weight:900; animation:pulseLogo 2s infinite ease-in-out, popIn 1s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .splash-spinner { margin-top:4vh; font-size:6vh; color:var(--main-color); }
        @keyframes popIn { 0%{transform:scale(0.5); opacity:0;} 100%{transform:scale(1); opacity:1;} }
        @keyframes pulseLogo { 0%,100%{transform:scale(1); text-shadow:0 0 0 rgba(255,215,0,0);} 50%{transform:scale(1.05); text-shadow:0 0 25px rgba(255,215,0,0.6);} }
        #orientation-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:99999; flex-direction:column; align-items:center; justify-content:center; color:var(--main-color); text-align:center; font-weight:900; font-size:3vh; }
        .phone-icon { font-size:10vh; margin-bottom:20px; animation:rotatePhone 2s infinite ease-in-out; }
        @keyframes rotatePhone { 0%,100%{transform:rotate(0deg); opacity:0;} 25%,50%{transform:rotate(-90deg); opacity:1;} 75%{transform:rotate(-90deg); opacity:0;} }
        @media screen and (max-width:768px) and (orientation:portrait) { #orientation-overlay{display:flex!important;} }
        button,.smart-card,.cat-item,.item,.power-btn,.key,.toggle-btn { cursor:pointer; }
        .focused { border:3px solid #fff!important; background:var(--main-color)!important; color:#000!important; z-index:50; box-shadow:none!important; transform:scale(1.02) translateZ(0)!important; transition:transform 0.1s, background 0.1s; }
        .focused i,.focused span,.focused div { color:#000!important; }
        #vid-box.focused { border:4px solid var(--main-color)!important; background:transparent!important; transform:none!important; }
        #vid-box.fs,#vid-box.fs.focused { border:none!important; width:100%!important; height:100%!important; z-index:9999!important; position:fixed!important; top:0!important; left:0!important; background:#000!important; transform:none!important; }
        .login-box { width:450px; max-width:90%; padding:40px; background:#0a0a0a; border:2px solid var(--main-color); border-radius:12px; text-align:center; }
        .logo-txt { font-size:4.5vh; font-weight:900; margin-bottom:2.5vh; }
        .theme-text { color:var(--main-color); }
        .inp { width:100%; padding:16px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; text-align:center; font-weight:600; border-radius:8px; font-size:16px; }
        .btn { width:100%; padding:16px; margin-top:20px; background:var(--main-color); color:#000; border:none; font-weight:900; border-radius:8px; font-size:16px; }
        .btn-logout { background:#333; color:#fff; margin-top:10px; border:1px solid #444; }
        .config-row { display:flex; gap:1vw; margin:2vh 0; }
        .toggle-btn { flex:1; padding:1.5vh; background:#1a1a1a; border:1px solid #333; color:#888; font-size:var(--font-sm); font-weight:800; border-radius:1vh; }
        .info-row { display:flex; justify-content:space-between; padding:1vh 0; border-bottom:1px solid #222; font-size:var(--font-sm); color:#ccc; }
        #content-layer { display:flex; width:100%; height:100%; background:#000; overflow:hidden; }
        .col-cat { width:25%; background:#08080a; display:flex; flex-direction:column; border-right:2px solid #1a1a1a; height:100%; overflow:hidden; }
        .col-list { width:35%; background:#101014; display:flex; flex-direction:column; border-right:2px solid #1a1a1a; height:100%; overflow:hidden; }
        .col-play { flex:1; display:flex; flex-direction:column; position:relative; background:#000; height:100%; overflow:hidden; }
        .cat-head { padding:15px; background:#15151a; color:var(--main-color); border-bottom:2px solid #222; text-align:center; font-size:var(--font-md); font-weight:900; flex-shrink:0; }
        .cat-top-row { display:flex; align-items:center; width:100%; }
        .cat-list,.item-list { flex:1; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; will-change:transform; transform:translateZ(0); touch-action:pan-y; }
        .cat-item,.item { padding:14px 20px; border-radius:6px; margin:6px 12px; color:#888; font-size:var(--font-sm); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border:1px solid transparent; }
        .cat-item.active { background:#1a1a1a; color:#fff; border-left:4px solid var(--main-color); }
        .search-area { padding:15px; background:#050505; border-bottom:2px solid #1a1a1a; flex-shrink:0; }
        .inp-search { width:100%; padding:12px; background:#111; border:1px solid #333; color:#fff; font-size:var(--font-sm); font-weight:bold; border-radius:6px; text-transform:uppercase; text-align:center; }
        .item { border-bottom:1px solid #1a1a1a; }
        .item.playing { color:var(--main-color); background:#111; border-left:4px solid var(--main-color); }
        .fav-icon { float:right; color:var(--main-color); }
        .vid-box { width:100%; height:50vh; background:#000; position:relative; border-bottom:2px solid #222; overflow:hidden; flex-shrink:0; touch-action:manipulation; transform:translateZ(0); }
        #player-container { width:100%; height:100%; background:#000; transform:translateZ(0); }
        video { width:100%; height:100%; object-fit:fill; background:#000; z-index:1; transform:translateZ(0); }
        .buffer-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .buffer-spinner { font-size:8vh; color:var(--main-color); text-shadow:0 0 15px rgba(255,215,0,0.5); }
        .meta { padding:25px; flex:1; height:100%; overflow-y:auto; background:#0a0a0c; display:flex; flex-direction:column; }
        .meta-title { font-size:var(--font-lg); color:var(--main-color); font-weight:900; margin-bottom:1vh; }
        .meta-desc { font-size:var(--font-sm); color:#999; margin-bottom:1vh; }
        .keys { display:flex; justify-content:space-between; align-items:center; gap:1vw; padding-top:2vh; border-top:2px solid #1a1a1a; margin-top:auto; flex-shrink:0; }
        .key { flex:1; font-size:var(--font-xs); color:#fff; font-weight:700; background:#1a1a1a; border:1px solid #333; padding:1.2vh 0.5vw; border-radius:0.8vh; display:flex; align-items:center; justify-content:center; white-space:nowrap; }
        .dot { width:1.2vh; height:1.2vh; border-radius:50%; flex-shrink:0; margin-right:1.2vw; }
        #pause-layer { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9000; align-items:center; justify-content:center; pointer-events:none; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-thumb { background:#444; border-radius:10px; }
    </style>
</head>
<body onload="App.init()">

<div id="splash-screen" style="display: none;">
    <div class="splash-logo"><span style="color:#fff">SKY</span> <span class="theme-text">GOLD</span></div>
    <i class="fas fa-circle-notch fa-spin splash-spinner"></i>
</div>

<div id="orientation-overlay">
    <i class="fas fa-mobile-alt phone-icon"></i>
    <div>POR FAVOR<br><span style="color: var(--main-color);">GIRE A TELA</span></div>
</div>

<!-- LOGIN -->
<div id="login-layer" class="layer flex-center hide">
    <div class="login-box">
        <div class="logo-txt"><span style="color:#fff">SKY</span>&nbsp;<span class="theme-text">GOLD</span></div>
        <input type="text" id="i0" class="inp focusable" placeholder="URL DNS" autocomplete="off">
        <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO" autocomplete="off">
        <input type="password" id="i2" class="inp focusable" placeholder="SENHA" autocomplete="off">
        <button id="i3" class="btn focusable" onclick="App.login(false)">ENTRAR AGORA</button>
        <div id="msg-login" style="color:var(--main-color); margin-top:20px; font-size:var(--font-sm); font-weight: 800;"></div>
    </div>
</div>

<!-- CONFIGURAÇÕES -->
<div id="settings-layer" class="layer hide flex-center">
    <div class="login-box">
        <div class="logo-txt" id="set-title-txt"><i class="fas fa-user-shield" style="margin-right:10px; color: var(--main-color);"></i>MINHA <span class="theme-text">CONTA</span></div>
        <div class="info-row"><span id="lbl-set-u">USUÁRIO:</span> <span id="set-user">...</span></div>
        <div class="info-row"><span id="lbl-set-e">VENCIMENTO:</span> <span id="set-exp">...</span></div>
        <div class="info-row"><span id="lbl-set-c">TELAS:</span> <span id="set-conn">...</span></div>
        <div class="info-row"><span id="lbl-set-d">CRIADO:</span> <span id="set-created">...</span></div>
        
        <div class="config-row" style="margin-top: 30px;"><div id="s0" class="toggle-btn focusable" style="border-color: #333; background: #111; cursor: default;">OPÇÕES</div></div>
        <div class="config-row">
            <div id="s1" class="toggle-btn focusable" onclick="App.toggleCfg('filter')"><span id="lbl-set-filter">XXX:</span> <span id="lbl-filter" style="color:#fff">NÃO</span></div>
            <div id="s2" class="toggle-btn focusable" onclick="App.toggleFormat()"><span id="lbl-set-format">FMT:</span> <span id="lbl-format" style="color:#fff">TS NAT</span></div>
        </div>
        
        <button id="s3" class="btn focusable" onclick="App.closeSettings()" style="background: #333; color: #fff; margin-top: 20px;">VOLTAR</button>
        <button id="s4" class="btn btn-logout focusable" onclick="App.logout()">SAIR / DESLOGAR</button>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL (TV AO VIVO) -->
<div id="content-layer" class="layer hide">
    <div class="col-cat">
        <div class="cat-head">
            <div class="cat-top-row"><div id="cat-title-txt" style="flex:1;">MENU</div></div>
            <div id="item-count" style="font-size: 0.7em; margin-top: 5px; opacity: 0.7;">TOTAL: ...</div>
        </div>
        <div id="cat-list" class="cat-list"></div>
    </div>
    <div class="col-list">
        <div class="search-area"><input type="text" id="search" class="inp-search focusable" placeholder="BUSCAR..." autocomplete="off"></div>
        <div id="item-list" class="item-list"></div>
    </div>
    <div class="col-play">
        <div id="vid-box" class="vid-box focusable" onclick="App.handleVideoTap(event)">
            <div id="player-container"><video id="player" playsinline webkit-playsinline></video></div>
            <div id="smart-buffer" class="buffer-overlay"><i class="fas fa-circle-notch fa-spin buffer-spinner"></i></div>
            <div id="pause-layer"><i class="fas fa-pause" style="font-size: 10vh; color: rgba(255, 255, 255, 0.9); text-shadow: 0 0 20px #000;"></i></div>
        </div>
        <div class="meta">
            <div id="meta-title" class="meta-title"><span style="color:#fff">SKY</span>&nbsp;GOLD</div>
            <div id="meta-desc" class="meta-desc"></div>
            <div class="keys">
                <div class="key" id="key-fs"><div class="dot" style="background-color:#FF0000;"></div> TELA CHEIA</div>
                <div class="key" id="key-top"><div class="dot" style="background-color:#00C851;"></div> TOPO</div>
                <div class="key" id="key-search"><div class="dot" style="background-color:#ffbb33;"></div> BUSCAR</div>
                <div class="key" id="key-menu"><div class="dot" style="background-color:#33b5e5;"></div> CONFIG.</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- UTILITÁRIOS ----------
        function safePlay(vid) { if(!vid) return; try { var p = vid.play(); p && p.catch && p.catch(function(){}); } catch(e){} }
        function requestNativeFullscreen(elem) {
            var t = elem || document.documentElement;
            try {
                if (t.requestFullscreen) { var p = t.requestFullscreen(); p && p.catch && p.catch(function(){}); }
                else if (t.webkitRequestFullscreen) t.webkitRequestFullscreen();
            } catch(e) {}
        }

        // ---------- FAVORITOS ----------
        var FavManager = {
            key: 'rc_favs_smart', list: [],
            init: function() { var s = localStorage.getItem(this.key); this.list = s ? JSON.parse(s) : []; },
            toggle: function(id) { var idx = this.list.indexOf(id); if(idx > -1) this.list.splice(idx, 1); else this.list.push(id); localStorage.setItem(this.key, JSON.stringify(this.list)); if (App && App.renderList) App.renderList(); },
            isFav: function(id) { return this.list.indexOf(id) > -1; }
        };

        // ---------- PLAYER ----------
        var PlayerEngine = {
            video: null, url: null, monitorTimer: null, lastTime: 0, stallCount: 0, retryCount: 0, isBuffering: false, maxRetries: 999999,
            init: function() { this.bindVideo(); },
            bindVideo: function() {
                this.video = document.getElementById('player'); if(!this.video) return;
                this.video.onerror = ()=> PlayerEngine.handleError(false);
                this.video.onabort = ()=> PlayerEngine.handleError(false);
                this.video.onstalled = ()=> PlayerEngine.showBuffer();
                this.video.onended = ()=> PlayerEngine.handleError(false);
                this.video.addEventListener('playing', ()=> PlayerEngine.onPlaySuccess());
                this.video.addEventListener('waiting', ()=> PlayerEngine.showBuffer());
                this.video.controls = false;
            },
            resetDOM: function() { if(this.video) { try{this.video.pause()}catch(e){} this.video.removeAttribute('src'); this.video.load(); } },
            play: function(url) {
                if (!url) return;
                if(this.url === url && !this.video.error) { if(this.video.paused) safePlay(this.video); return; }
                if (this.url && this.url !== url) { this.hardStop(); this.resetDOM(); }
                this.url = url; this.stallCount = this.retryCount = 0;
                this.showBuffer();
                document.getElementById('pause-layer').style.display = 'none';
                if(this.video) { this.video.src = url; safePlay(this.video); }
                this.startMonitor();
            },
            onPlaySuccess: function() { this.stallCount = this.retryCount = 0; this.hideBuffer(); },
            showBuffer: function() { this.isBuffering = true; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'flex'; },
            hideBuffer: function() { this.isBuffering = false; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'none'; },
            startMonitor: function() {
                this.stopMonitor();
                this.monitorTimer = setInterval(()=> {
                    var v = PlayerEngine.video; if(!v || !PlayerEngine.url || v.paused) return;
                    if(Math.abs(v.currentTime - PlayerEngine.lastTime) < 0.1) {
                        PlayerEngine.stallCount++;
                        if(PlayerEngine.stallCount > 3) PlayerEngine.showBuffer();
                        if(PlayerEngine.stallCount > 6) { PlayerEngine.stallCount = 0; PlayerEngine.handleError(true); }
                    } else { PlayerEngine.stallCount = 0; PlayerEngine.lastTime = v.currentTime; if(PlayerEngine.isBuffering) PlayerEngine.hideBuffer(); }
                }, 2000);
            },
            stopMonitor: function() { if(this.monitorTimer) clearInterval(this.monitorTimer); },
            handleError: function(isStall) {
                if (this.retryCount < this.maxRetries) {
                    this.retryCount++; this.showBuffer(); this.resetDOM();
                    var delay = Math.min(1000 * Math.pow(1.5, this.retryCount), 5000);
                    setTimeout(()=> { if(PlayerEngine.video && PlayerEngine.url) { PlayerEngine.video.src = PlayerEngine.url; safePlay(PlayerEngine.video); } }, delay);
                } else { this.hardStop(); }
            },
            hardStop: function() { this.stopMonitor(); this.resetDOM(); this.url = null; this.hideBuffer(); }
        };

        // ---------- APLICATIVO PRINCIPAL ----------
        var App = {
            validCategories: null, scr: 0, zone: 0, idx: 0, lastCatIdx: -1, creds: {}, fullData: [], playingId: null,
            cfg: { filter: false, format: 'ts_native', lang: 'pt' }, userInfo: null, lastEnter: 0,
            categoryDataCache: null, lastScreenSwitch: 0, currentMode: 'live',

            pad: n => (n < 10 ? "0"+n : n),
            smartSort: (a,b) => (a.name||a.title||"").toLowerCase().localeCompare((b.name||b.title||"").toLowerCase(), undefined, {numeric:true, sensitivity:'base'}),

            i18n: { 'pt': { ph_dns:'URL DNS', ph_user:'USUÁRIO', ph_pass:'SENHA', btn_login:'CONECTAR', err_net:'Falha Conexão', err_auth:'Login Inválido',
                set_title:'MINHA CONTA', set_u:'USUÁRIO:', set_e:'VENCE:', set_c:'TELAS:', set_d:'CRIADO:', set_opt:'OPÇÕES', set_filter:'XXX:', set_format:'FMT:',
                set_back:'VOLTAR', yes:'SIM', no:'NÃO', cat_title:'MENU', cat_fav:'⭐ FAVORITOS', search_ph:'BUSCAR...', empty:'Vazio', tot_chan:'CANAIS',
                tot_pre:'TOTAL: ', unlimited:'Ilimitado', unknown:'Desconhecido', btn_out:'SAIR / DESLOGAR' } },

            applyLang: function() {
                var t = this.i18n.pt;
                document.getElementById('i0').placeholder = t.ph_dns; document.getElementById('i1').placeholder = t.ph_user; document.getElementById('i2').placeholder = t.ph_pass; document.getElementById('i3').innerText = t.btn_login;
                document.getElementById('set-title-txt').innerHTML = '<i class="fas fa-user-shield" style="margin-right:10px; color: var(--main-color);"></i>' + t.set_title;
                document.getElementById('lbl-set-u').innerText = t.set_u; document.getElementById('lbl-set-e').innerText = t.set_e; document.getElementById('lbl-set-c').innerText = t.set_c; document.getElementById('lbl-set-d').innerText = t.set_d;
                document.getElementById('s0').innerText = t.set_opt; document.getElementById('lbl-set-filter').innerText = t.set_filter; document.getElementById('lbl-set-format').innerText = t.set_format;
                document.getElementById('s3').innerText = t.set_back; document.getElementById('s4').innerText = t.btn_out;
                document.getElementById('cat-title-txt').innerText = t.cat_title; document.getElementById('search').placeholder = t.search_ph;
                this.updateCfgUI();
            },

            init: function() {
                FavManager.init();
                if(localStorage.getItem('rc_cfg_filter')) this.cfg.filter = (localStorage.getItem('rc_cfg_filter') === 'true');
                var fmt = localStorage.getItem('rc_cfg_format'); this.cfg.format = (fmt === 'm3u8_native' || fmt === 'ts_native') ? fmt : 'ts_native';
                this.applyLang(); PlayerEngine.init();
                this.updateClock(); setInterval(()=> this.updateClock(), 60000);
                var splash = document.getElementById('splash-screen');
                if(splash) { splash.style.display = 'flex'; splash.style.opacity = '1'; }
                if(localStorage.getItem('rc_h')) {
                    document.getElementById('i0').value = localStorage.getItem('rc_h'); document.getElementById('i1').value = localStorage.getItem('rc_u'); document.getElementById('i2').value = localStorage.getItem('rc_p');
                    App.login(true);
                } else {
                    setTimeout(()=> {
                        if(splash) { splash.style.opacity = '0'; setTimeout(()=> splash.style.display = 'none', 500); }
                        App.setScr(0);
                    }, 2000);
                }
            },

            toggleCfg: function(type) { if(type==='filter') { this.cfg.filter = !this.cfg.filter; localStorage.setItem('rc_cfg_filter', this.cfg.filter); } this.updateCfgUI(); },
            toggleFormat: function() { this.cfg.format = (this.cfg.format === 'ts_native') ? 'm3u8_native' : 'ts_native'; localStorage.setItem('rc_cfg_format', this.cfg.format); this.updateCfgUI(); },
            updateCfgUI: function() {
                var t = this.i18n.pt;
                document.getElementById('lbl-filter').innerText = this.cfg.filter ? t.yes : t.no;
                document.getElementById('s1').style.borderColor = this.cfg.filter ? '#00C851' : '#333';
                document.getElementById('lbl-filter').style.color = this.cfg.filter ? '#00C851' : '#888';
                var fLbl = this.cfg.format === 'm3u8_native' ? "M3U8 NAT" : "TS NAT";
                document.getElementById('lbl-format').innerText = fLbl;
                document.getElementById('s2').style.borderColor = (this.cfg.format !== 'ts_native') ? '#00C851' : '#333';
                document.getElementById('lbl-format').style.color = (this.cfg.format !== 'ts_native') ? '#00C851' : '#888';
            },

            updateClock: function() {
                var now = new Date(), h = now.getHours(), m = now.getMinutes(); if(m<10) m='0'+m;
                var elT = document.getElementById('clock-time'); if(elT) elT.innerText = h+":"+m;
                var dateStr = now.toLocaleDateString('pt-BR');
                var elD = document.getElementById('clock-date'); if(elD) elD.innerText = dateStr;
            },

            req: function(url, cb) {
                var x = new XMLHttpRequest(); var cacheBuster = (url.indexOf('?') > -1 ? '&' : '?') + '_t=' + Date.now();
                x.open("GET", url + cacheBuster, true); x.timeout = 20000;
                x.onload = function() { if(x.status===200) { try { cb(JSON.parse(x.responseText)); } catch(e) { cb(null); } } else cb(null); x = null; };
                x.onerror = x.ontimeout = function() { cb('ERR_NET'); x = null; }; x.send();
            },

            login: function(isAuto) {
                var h = document.getElementById('i0').value.trim(), u = document.getElementById('i1').value.trim(), p = document.getElementById('i2').value.trim();
                if(h.endsWith('/')) h = h.slice(0,-1); if(!h.startsWith('http')) h = 'http://'+h;
                var splash = document.getElementById('splash-screen');
                if(!isAuto && splash) { splash.style.display = 'flex'; setTimeout(()=> splash.style.opacity = '1', 10); requestNativeFullscreen(); }
                this.req(h+"/player_api.php?username="+u+"&password="+p, d => {
                    if(splash) { splash.style.opacity = '0'; setTimeout(()=> splash.style.display = 'none', 500); }
                    if(d === 'ERR_NET') {
                        if(isAuto) { if(splash) { splash.style.display = 'flex'; splash.style.opacity = '1'; } setTimeout(()=> App.login(true), 5000); }
                        else { App.setScr(0); document.getElementById('msg-login').innerHTML = App.i18n.pt.err_net; }
                        return;
                    }
                    if(d && d.user_info && d.user_info.auth==1) {
                        App.creds = {h,u,p}; localStorage.setItem('rc_h',h); localStorage.setItem('rc_u',u); localStorage.setItem('rc_p',p);
                        var info = d.user_info;
                        var exp = info.exp_date ? new Date(info.exp_date*1000).toLocaleDateString('pt-BR') : App.i18n.pt.unlimited;
                        var active = info.active_cons || 0, max = info.max_connections || 1;
                        var created = info.created_at ? new Date(info.created_at*1000).toLocaleDateString('pt-BR') : App.i18n.pt.unknown;
                        document.getElementById('set-user').innerText = info.username || u;
                        document.getElementById('set-exp').innerText = exp;
                        document.getElementById('set-conn').innerText = active + " / " + max;
                        document.getElementById('set-created').innerText = created;
                        App.openMode('live');
                    } else { App.setScr(0); document.getElementById('msg-login').innerText = App.i18n.pt.err_auth; localStorage.clear(); }
                });
            },
            logout: function() { PlayerEngine.hardStop(); localStorage.clear(); location.reload(); },

            setScr: function(n) {
                this.lastScreenSwitch = Date.now(); if(n===2) PlayerEngine.hardStop();
                document.querySelectorAll('.layer').forEach(l=> l.classList.add('hide'));
                if(n===0) document.getElementById('login-layer').classList.remove('hide');
                if(n===2) document.getElementById('content-layer').classList.remove('hide');
                if(n===3) document.getElementById('settings-layer').classList.remove('hide');
                this.scr = n; this.zone = 0; this.idx = 0; this.updateFocus();
            },

            openSettings: function() { this.setScr(3); this.idx = 0; this.updateFocus(); requestNativeFullscreen(); },
            
            // FECHAR CONFIGURAÇÕES: FORÇA ATUALIZAÇÃO COMPLETA (CORREÇÃO PRINCIPAL)
            closeSettings: function() {
                PlayerEngine.hardStop();
                this.fullData = null;
                this.categoryDataCache = null;
                this.lastCatIdx = -1;
                this.playingId = null;
                this.setScr(2);
                setTimeout(() => {
                    // Recarrega completamente o modo live com as novas configurações
                    this.openMode('live', true);
                }, 50);
            },

            countGlobal: function() {
                var t = this.i18n.pt, countEl = document.getElementById('item-count');
                var cacheKey = 'rc_total_live_' + this.creds.u;
                var cached = localStorage.getItem(cacheKey);
                if(cached) { if(countEl) countEl.innerText = t.tot_pre + cached + " " + t.tot_chan; }
                else { if(countEl) countEl.innerText = "CONTANDO..."; }
                this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_streams", d => {
                    if(d && d!=='ERR_NET') {
                        var total = 0, junk = ['adulto','xxx','sex','porn','+18','teste','off','expirado'];
                        if(this.cfg.filter) {
                            for(var i=0; i<d.length; i++) { var nome = (d[i].name||"").toLowerCase(); var show = true;
                                for(var j=0; j<junk.length; j++) if(nome.indexOf(junk[j]) > -1) { show=false; break; } if(show) total++; }
                        } else total = d.length;
                        try { localStorage.setItem(cacheKey, total); } catch(e){}
                        if(countEl) countEl.innerText = t.tot_pre + total + " " + t.tot_chan;
                    }
                });
            },

            openMode: function(mode, isTrusted) {
                if (!isTrusted && Date.now() - (this.lastScreenSwitch||0) < 500) return;
                this.fullData = null; this.categoryDataCache = null; this.fullData = []; this.lastCatIdx = -1;
                document.getElementById('cat-list').innerHTML = '';
                document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center; color:#888; font-weight:bold; font-size:2vh; margin-top:20vh;">&larr; SELECIONE UMA CATEGORIA</div>';
                this.currentMode = 'live'; PlayerEngine.hardStop(); this.resetInfo(); requestNativeFullscreen();
                this.playingId = null; this.validCategories = null; this.setScr(2);
                document.getElementById('search').value = ''; setTimeout(()=> this.countGlobal(), 500);
                var t = this.i18n.pt;
                this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_categories", d => {
                    if(d && d!=='ERR_NET') {
                        var h = ['<div class="cat-item" role="button" tabindex="-1" id="c0" data-id="fav" onclick="App.catClick(0, true)">' + t.cat_fav + '</div>'];
                        var count = 0, junk = ['adulto','xxx','sex','porn','+18','teste','off','expirado'];
                        this.validCategories = {};
                        for(var i=0; i<d.length; i++) {
                            var nome = d[i].category_name, show = true;
                            if(this.cfg.filter) { var lower = nome.toLowerCase(); for(var j=0; j<junk.length; j++) if(lower.indexOf(junk[j]) > -1) { show=false; break; } }
                            if(show) { count++; h.push('<div class="cat-item" role="button" tabindex="-1" id="c'+count+'" data-id="'+d[i].category_id+'" onclick="App.catClick('+count+', true)">'+nome+'</div>'); this.validCategories[String(d[i].category_id)] = true; }
                        }
                        document.getElementById('cat-list').innerHTML = h.join('');
                        this.zone = 0; this.idx = 0; this.updateFocus();
                    } else {
                        document.getElementById('cat-list').innerHTML = '<div style="padding:20px; color:#888;">Erro ao carregar categorias</div>';
                    }
                });
            },
            
            resetInfo: function() { document.getElementById('meta-title').innerHTML = '<span style="color:#fff">SKY</span>&nbsp;GOLD'; document.getElementById('meta-desc').innerText = ""; PlayerEngine.hardStop(); document.getElementById('pause-layer').style.display = 'none'; },
            
            catClick: function(i, isTrusted) {
                if (!isTrusted && Date.now() - (this.lastScreenSwitch||0) < 500) return;
                if (i === -1) return; this.idx = i; this.zone = 0; this.loadContent(i, true);
            },

            loadContent: function(catIdx, jumpFocus) {
                if (catIdx === -1) return;
                document.getElementById('item-list').innerHTML = ''; this.lastCatIdx = catIdx;
                var el = document.getElementById('c'+catIdx); if(!el) return;
                var cid = el.getAttribute('data-id');
                document.querySelectorAll('.cat-item').forEach(c=> c.classList.remove('active')); el.classList.add('active');
                document.getElementById('search').value = '';
                document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center; color: var(--main-color); font-size:30px;"><i class="fas fa-circle-notch fa-spin"></i></div>';
                var t = this.i18n.pt;
                var actionStrm = 'get_live_streams';

                var onData = d => {
                    if(d && d!=='ERR_NET') {
                        var junk = ['adulto','xxx','sex','porn','+18','teste','off','expirado'];
                        this.fullData = null; this.categoryDataCache = null;
                        if(this.cfg.filter) {
                            var res = [];
                            for(var k=0; k<d.length; k++) { var nome = (d[k].name||"").toLowerCase(); var show = true;
                                for(var j=0; j<junk.length; j++) if(nome.indexOf(junk[j]) > -1) { show=false; break; } if(show) res.push(d[k]); }
                            this.fullData = res;
                        } else this.fullData = d;
                        this.categoryDataCache = this.fullData;
                        if(jumpFocus && this.fullData.length) { this.zone = 2; this.idx = 0; }
                        this.renderList();
                    } else { document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center;">'+t.empty+'</div>'; }
                };

                if(cid === 'fav') {
                    this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action="+actionStrm, d => {
                        if(d && d!=='ERR_NET') {
                            var favs = d.filter(x => FavManager.isFav(x.stream_id || x.id));
                            this.fullData = null; this.categoryDataCache = null;
                            this.fullData = favs; this.categoryDataCache = favs;
                            if(jumpFocus && favs.length) { this.zone = 2; this.idx = 0; }
                            this.renderList();
                        }
                    });
                } else {
                    this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action="+actionStrm+"&category_id="+cid, onData);
                }
            },

            renderList: function() {
                var d = this.fullData, max = d.length, t = this.i18n.pt, listEl = document.getElementById('item-list');
                var countEl = document.getElementById('item-count'); if(countEl) countEl.innerText = t.tot_pre + max;
                if(max===0) { listEl.innerHTML = '<div style="padding:20px; text-align:center;">'+t.empty+'</div>'; return; }
                var h = [];
                for(var i=0; i<max; i++) {
                    var n = d[i].name || d[i].title, id = d[i].stream_id || d[i].id;
                    var icn = FavManager.isFav(id) ? '<i class="fas fa-star fav-icon"></i>' : '';
                    var playingClass = (this.playingId == id) ? ' playing' : '';
                    h.push('<div class="item'+playingClass+'" role="button" tabindex="-1" id="row-'+i+'" onclick="App.itemClick('+i+', true)">'+n+icn+'</div>');
                }
                listEl.innerHTML = h.join('');
                this.updateFocus();
            },

            itemClick: function(i, isTrusted) {
                if (!isTrusted && Date.now() - (this.lastScreenSwitch||0) < 500) return;
                this.idx = i; this.zone = 2; this.updateFocus(); this.clickItem(); requestNativeFullscreen();
            },
            
            clickItem: function() { var item = this.fullData[this.idx]; if(item) this.playStream(item); },

            playStream: function(item) {
                var id = item.stream_id || item.id;
                var ext = this.cfg.format === 'm3u8_native' ? 'm3u8' : 'ts';
                var url = this.creds.h+"/live/"+this.creds.u+"/"+this.creds.p+"/"+id+"."+ext;
                this.playingId = id;
                document.getElementById('meta-title').innerText = item.name || item.title;
                document.getElementById('meta-desc').innerText = "";
                PlayerEngine.play(url);
                document.querySelectorAll('.item').forEach(el=> el.classList.remove('playing'));
                var r = document.getElementById('row-'+this.idx); if(r) r.classList.add('playing');
            },
            
            switchChannel: function(dir) {
                if (!this.fullData || !this.fullData.length) return;
                var n = this.idx + dir;
                if (n < 0) n = this.fullData.length - 1;
                if (n >= this.fullData.length) n = 0;
                this.itemClick(n, true);
            },

            syncFocusToPlaying: function() {
                if(!this.playingId) return;
                for(var i=0; i<this.fullData.length; i++) {
                    if((this.fullData[i].stream_id || this.fullData[i].id) == this.playingId) { this.idx = i; this.renderList(); this.updateFocus(); return; }
                }
            },
            
            removeAccents: s => (s||"").toLowerCase().replace(/[áàãâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòõôö]/g,'o').replace(/[úùûü]/g,'u').replace(/[ç]/g,'c'),

            doSearch: function(isGlobal) {
                var raw = document.getElementById('search').value;
                if(!raw) { if(this.lastCatIdx>-1) this.loadContent(this.lastCatIdx); else { this.fullData=[]; this.renderList(); } return; }
                if(raw.length<2) return;
                var tStr = this.removeAccents(raw), listEl = document.getElementById('item-list');
                if(isGlobal) {
                    listEl.innerHTML = '<div style="padding:20px; text-align:center;"><i class="fas fa-circle-notch fa-spin" style="font-size:5vh;"></i><br>BUSCANDO...</div>';
                    this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_streams", d => {
                        if(d && d!=='ERR_NET') {
                            var res = [], junk = ['adulto','xxx','sex','porn','+18'];
                            for(var i=0; i<d.length; i++) {
                                var nome = d[i].name || d[i].title || "", show = true;
                                if(this.cfg.filter) { var low = nome.toLowerCase(); for(var j=0; j<junk.length; j++) if(low.indexOf(junk[j]) > -1) { show=false; break; } }
                                if(show && this.removeAccents(nome).indexOf(tStr) > -1) { res.push(d[i]); if(res.length>=100) break; }
                            }
                            if(res.length) { res.sort(this.smartSort); this.fullData = res; this.zone=2; this.idx=0; this.renderList(); }
                            else { listEl.innerHTML = '<div style="padding:20px; text-align:center;">Nenhum resultado.</div>'; document.getElementById('item-count').innerText = this.i18n.pt.tot_pre + "0"; }
                        } else listEl.innerHTML = '<div style="padding:20px;">Erro na conexão.</div>';
                    });
                } else {
                    listEl.innerHTML = '<div style="padding:20px; text-align:center;"><i class="fas fa-circle-notch fa-spin"></i></div>';
                    setTimeout(()=> {
                        var base = this.categoryDataCache || this.fullData;
                        if(!base || !base.length) { listEl.innerHTML = '<div style="padding:20px;">'+this.i18n.pt.empty+'</div>'; return; }
                        var res = base.filter(x => this.removeAccents(x.name||x.title||"").indexOf(tStr) > -1);
                        if(res.length) { this.fullData = res; this.renderList(); }
                        else listEl.innerHTML = '<div style="padding:20px;">Não encontrado.<br><b style="color:var(--main-color);">ENTER para busca global</b></div>';
                    }, 50);
                }
            },
            
            // ========== COMPORTAMENTO ORIGINAL DE TELA CHEIA ==========
            handleVideoTap: function(e) {
                e.preventDefault(); if(!this.playingId) return;
                var now = Date.now(), diff = now - (this.lastTap||0); this.lastTap = now;
                // Em live, apenas alterna tela cheia (original)
                if (diff < 300 && diff > 0) { clearTimeout(this.tapTimer); this.toggleFull(); }
                else { this.tapTimer = setTimeout(()=> { this.toggleFull(); this.zone = 3; this.updateFocus(); }, 300); }
            },
            
            toggleFull: function() { 
                if(!this.playingId) return; 
                var b = document.getElementById('vid-box'); 
                if(b.classList.contains('fs')) { this.exitFull(); } 
                else { b.classList.add('fs'); requestNativeFullscreen(b); } 
            },
            exitFull: function() { 
                document.getElementById('vid-box').classList.remove('fs'); 
                try { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); } catch(e) {} 
                this.syncFocusToPlaying(); 
            },
            // =========================================================
            
            back: function(isTrusted) {
                if (!isTrusted && Date.now() - (this.lastScreenSwitch||0) < 500) return;
                if(document.getElementById('vid-box').classList.contains('fs')) { this.exitFull(); return; }
                if(this.zone===3) { this.zone=2; this.syncFocusToPlaying(); this.updateFocus(); return; }
                if(this.zone===2) { this.zone=0; this.idx=(this.lastCatIdx>-1?this.lastCatIdx:0); this.updateFocus(); return; }
                if(this.zone===1) { this.zone=2; this.idx=0; this.updateFocus(); return; }
            },
            
            updateFocus: function() {
                document.querySelectorAll('.focused').forEach(el=> el.classList.remove('focused'));
                var el;
                if(this.scr===0) el = document.getElementById('i'+this.idx);
                if(this.scr===3) el = document.getElementById('s'+this.idx);
                if(this.scr===2) {
                    if(this.zone===0) el = document.getElementById('c'+this.idx);
                    else if(this.zone===1) el = document.getElementById('search');
                    else if(this.zone===2) el = document.getElementById('row-'+this.idx);
                    else if(this.zone===3) el = document.getElementById('vid-box');
                }
                if(el) {
                    el.classList.add('focused');
                    if(el.tagName==='INPUT') { try{el.focus({preventScroll:true});} catch(e){el.focus();} }
                    else { document.querySelectorAll('input').forEach(i=> i.blur()); if(document.activeElement) document.activeElement.blur(); }
                    if(el.tagName!=='INPUT') {
                        var p = el.parentElement;
                        while(p && p!==document.body) {
                            if(getComputedStyle(p).overflowY === 'auto' || getComputedStyle(p).overflowY === 'scroll') {
                                try { p.scrollTo({top: el.offsetTop - p.clientHeight/2 + el.clientHeight/2, behavior:'smooth'}); } catch(e){ p.scrollTop = el.offsetTop - p.clientHeight/2 + el.clientHeight/2; } break;
                            }
                            p = p.parentElement;
                        }
                    }
                }
            },
            
            move: function(d) {
                var s = this.scr;
                if(s===0) { if(d===1 && this.idx<3) this.idx++; if(d===0 && this.idx>0) this.idx--; }
                else if(s===3) {
                    if(this.idx===0) { if(d===1) this.idx=1; }
                    else if(this.idx===1) { if(d===1) this.idx=3; else if(d===3) this.idx=2; else if(d===0) this.idx=0; }
                    else if(this.idx===2) { if(d===1) this.idx=3; else if(d===2) this.idx=1; else if(d===0) this.idx=0; }
                    else if(this.idx===3) { if(d===1) this.idx=4; else if(d===0) this.idx=1; }
                    else if(this.idx===4) { if(d===0) this.idx=3; }
                }
                else if(s===2) {
                    if(this.zone===3) { if(d===2) { this.zone=2; this.syncFocusToPlaying(); this.updateFocus(); } return; }
                    if(this.zone===0) {
                        var max = document.getElementById('cat-list').children.length-1;
                        if(d===1 && this.idx<max) this.idx++;
                        if(d===0 && this.idx>0) this.idx--;
                        if(d===3 && this.fullData.length) { this.zone=2; this.idx=0; this.renderList(); }
                    }
                    else if(this.zone===2) {
                        var len = this.fullData.length;
                        if(d===1) { if(this.idx < len-1) this.idx++; }
                        else if(d===0) { if(this.idx > 0) this.idx--; else if(this.idx===0) this.zone=1; }
                        else if(d===2) { this.zone=0; this.idx=(this.lastCatIdx>-1?this.lastCatIdx:0); }
                        else if(d===3) this.zone=3;
                    }
                    else if(this.zone===1) { if(d===1) { this.zone=2; this.idx=0; } if(d===2) { this.zone=0; this.idx=(this.lastCatIdx>-1?this.lastCatIdx:0); } }
                }
                this.updateFocus();
            },

            enter: function() {
                var now = Date.now(); if(now - this.lastEnter < 400) return; this.lastEnter = now;
                if(this.scr===0) { if(this.idx===3) this.login(false); else if(this.idx<3) this.move(1); }
                else if(this.scr===3) { if(this.idx===1) this.toggleCfg('filter'); else if(this.idx===2) this.toggleFormat(); else if(this.idx===3) this.closeSettings(); else if(this.idx===4) this.logout(); }
                else if(this.scr===2) {
                    if(this.zone===0) this.catClick(this.idx, true);
                    else if(this.zone===1) { document.getElementById('search').blur(); this.doSearch(true); }
                    else if(this.zone===2) this.clickItem();
                    else if(this.zone===3) this.toggleFull();
                }
            }
        };

        window.App = App;

        // ---------- EVENTOS DE TECLADO (ORIGINAL) ----------
        document.addEventListener('keydown', function(e) {
            var k = e.keyCode;
            var isLeft = (k===37), isUp = (k===38), isRight = (k===39), isDown = (k===40), isEnter = (k===13||k===295), isBack = (k===8||k===27||k===461||k===10009||k===88);
            var isRed = (k===403||k===82), isGreen = (k===404||k===71), isYellow = (k===405||k===89), isBlue = (k===406||k===66||k===275);
            var isChUp = (k===427||k===33), isChDown = (k===428||k===34);

            if(document.activeElement && document.activeElement.tagName==='INPUT' && App.scr===0) {
                if(isEnter||isDown) { e.preventDefault(); App.move(1); return; } if(isUp) { e.preventDefault(); App.move(0); return; } return;
            }
            if(App.scr===2 && document.activeElement && document.activeElement.tagName==='INPUT') {
                if(isEnter) { e.preventDefault(); document.activeElement.blur(); App.doSearch(true); return; }
                if(isDown) { e.preventDefault(); document.activeElement.blur(); App.zone=2; App.idx=0; App.updateFocus(); return; }
                if(isLeft||isRight) return;
                return;
            }
            if(App.scr===2) { if(isChUp) { e.preventDefault(); App.switchChannel(1); return; } if(isChDown) { e.preventDefault(); App.switchChannel(-1); return; } }
            if(k===48||k===96) { if(App.scr===2 && App.zone===2) { var it=App.fullData[App.idx]; if(it) FavManager.toggle(it.stream_id||it.id); } }
            
            var isFull = document.getElementById('vid-box').classList.contains('fs');
            if(isFull) { 
                e.preventDefault(); 
                if(isRed || isBack) App.exitFull(); 
                return; 
            }
            
            if(isLeft) { e.preventDefault(); App.move(2); }
            if(isUp) { e.preventDefault(); App.move(0); }
            if(isRight) { e.preventDefault(); App.move(3); }
            if(isDown) { e.preventDefault(); App.move(1); }
            if(isEnter) { e.preventDefault(); App.enter(); }
            if(isBack) { e.preventDefault(); if(App.scr===3) App.closeSettings(); else if(App.scr>0) App.back(true); }
            if(isRed && App.scr===2) App.toggleFull();
            if(isGreen && App.scr===2) { App.zone=0; App.idx=0; App.updateFocus(); }
            if(isYellow && App.scr===2) { App.zone=1; App.updateFocus(); }
            if(isBlue) { e.preventDefault(); if(App.scr===2) App.openSettings(); }
        });

        window.addEventListener('beforeunload', ()=> PlayerEngine.hardStop());
        window.addEventListener('unload', ()=> PlayerEngine.hardStop());
        window.addEventListener('pagehide', ()=> PlayerEngine.hardStop());
    })();
</script>
