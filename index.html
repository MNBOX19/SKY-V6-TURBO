<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>IPTV OSCORP - STB EDITION</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #000000;
            --main-color: #FFD700; 
            --font-xs: 1.8vh; --font-sm: 2.2vh; --font-md: 3vh; --font-lg: 5vh;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;           
        }
        
        html, body {
            background: #000000; color: #ffffff; font-family: 'Montserrat', sans-serif;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; 
            overflow: hidden !important; overscroll-behavior: none; touch-action: none;
        }

        .hide { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; overflow: hidden; }

        button, .smart-card, .cat-item, .item, .power-btn, .key, .toggle-btn { cursor: pointer; }
        
        /* Sistema de Foco STB */
        .focused { 
            border: 3px solid #fff !important; background: var(--main-color) !important; color: #000 !important; 
            z-index: 50; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5) !important; transform: scale(1.03) translateZ(0) !important;
            transition: transform 0.15s ease-out, background 0.1s, border 0.1s;
        }
        .focused i, .focused span, .focused div, .focused svg { color: #000 !important; }
        
        #vid-box.focused { border: 4px solid var(--main-color) !important; background: transparent !important; transform: none !important; }
        #vid-box.fs, #vid-box.fs.focused { border: none !important; width: 100% !important; height: 100% !important; z-index: 9999 !important; position: fixed !important; top: 0 !important; left: 0 !important; background: #000 !important; transform: none !important; }

        /* Login e Configurações */
        .login-box { width: 450px; max-width: 90%; padding: 40px; background: #0a0a0a; border: 2px solid var(--main-color); border-radius: 12px; text-align: center; }
        .logo-txt { font-size: 4.5vh; font-weight: 900; margin-bottom: 2.5vh; }
        .theme-text { color: var(--main-color); }
        .inp { width: 100%; padding: 16px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; text-align: center; font-weight: 600; border-radius: 8px; font-size: 16px; transition: border 0.2s; }
        .btn { width: 100%; padding: 16px; margin-top: 20px; background: var(--main-color); color: #000; border: none; font-weight: 900; border-radius: 8px; font-size: 16px; }
        .btn-logout { background: #333; color: #fff; margin-top: 10px; border: 1px solid #444; }

        .config-row { display: flex; gap: 1vw; margin: 2vh 0; }
        .toggle-btn { flex: 1; padding: 1.5vh; background: #1a1a1a; border: 1px solid #333; color: #888; font-size: var(--font-sm); font-weight: 800; border-radius: 1vh; }
        .info-row { display: flex; justify-content: space-between; padding: 1vh 0; border-bottom: 1px solid #222; font-size: var(--font-sm); color: #ccc; }
        
        /* Dashboard Principal */
        #dash-layer { display: flex; flex-direction: column; padding: 4vh 4vw; height: 100%; overflow: hidden; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; height: 14vh; margin-bottom: 2vh; flex-shrink: 0; }
        .dash-logo { font-size: var(--font-lg); font-weight: 900; }
        .dash-clock { text-align: right; }
        .clock-time { font-size: 6vh; font-weight: 700; color: #eee; line-height: 1; }
        .clock-date { font-size: 2.5vh; color: #ccc; font-weight: 600; margin-top: 0.8vh; }
        
        .top-actions { display: flex; gap: 2vh; }
        .power-btn { width: 7vh; height: 7vh; font-size: 3.5vh; background: #111; border: 2px solid #222; color: #888; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; border-radius: 50%; }

        .dash-grid { display: flex; gap: 4vw; justify-content: center; align-items: center; flex: 1; width: 100%; }
        .smart-card { width: 24vw; height: 45vh; background: #0a0a0a; border: 2px solid #222; border-radius: 2vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .smart-card svg { width: 10vh; height: 10vh; margin-bottom: 3vh; color: #555; transition: color 0.2s ease; }
        .smart-card span { font-size: 3vh; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        
        .bottom-bar { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 1vh; flex-shrink: 0; }
        .info-pill { background: #111; padding: 1.5vh 2.5vw; border-radius: 1vh; border: 1px solid #222; }
        .lbl { font-size: var(--font-xs); color: #888; display: block; font-weight: 700; margin-bottom: 4px; }
        .val { font-size: var(--font-md); color: var(--main-color); font-weight: 900; }

        /* Colunas de Conteúdo */
        #content-layer { display: flex; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .col-cat { width: 22%; background: #050505; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; height: 100%; z-index: 3; }
        .col-list { width: 45%; background: #0a0a0a; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; height: 100%; z-index: 2; }
        .col-play { flex: 1; display: flex; flex-direction: column; background: #000; height: 100%; z-index: 1; }

        .cat-head { padding: 2vh 1.5vw; background: #0a0a0a; color: var(--main-color); border-bottom: 1px solid #1a1a1a; text-align: left; flex-shrink: 0; }
        .cat-top-row { display: flex; align-items: center; width: 100%; }
        .btn-voltar { width: 5vh; height: 5vh; border-radius: 1vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: var(--font-sm); margin-right: 1vw; color: #fff; }
        #cat-title-txt { font-size: 2.5vh; font-weight: 900; }
        
        .cat-list, .item-list { flex: 1; height: 100%; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
        
        .cat-item { padding: 1.8vh 1.5vw; border-radius: 0.8vh; margin: 0.8vh 1vw; color: #888; font-size: var(--font-sm); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 2px solid transparent; transition: all 0.2s; }
        .cat-item.active { background: #1a1a1a; color: #fff; border-left: 4px solid var(--main-color); }
        
        .search-area { padding: 2vh; background: #050505; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; position: relative; display: flex; align-items: center; }
        .search-area svg { position: absolute; left: 3.5vh; color: #666; width: 2.5vh; height: 2.5vh; }
        .inp-search { width: 100%; padding: 1.5vh 1.5vh 1.5vh 5vh; background: #111; border: 2px solid #222; color: #fff; font-size: var(--font-sm); font-weight: bold; border-radius: 1vh; text-transform: uppercase; }
        .inp-search::placeholder { color: #555; }
        
        /* Lista Estilo TV (Ao Vivo) */
        .item { padding: 1.8vh 2vh; border-bottom: 1px solid #111; color: #aaa; font-size: var(--font-sm); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 4px solid transparent; }
        .item.playing { color: #fff; background: #111; border-left: 4px solid var(--main-color); }
        .fav-icon { float: right; color: var(--main-color); }

        /* Grade Estilo VOD/Séries (Capas) */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1.5vh; padding: 2vh; }
        .item-card { position: relative; border-radius: 1vh; overflow: hidden; background: #111; border: 3px solid transparent; cursor: pointer; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, border 0.2s; }
        .item-card img { width: 100%; height: 100%; object-fit: cover; }
        .item-card .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); padding: 3vh 1vh 1vh 1vh; }
        .item-card .card-title { font-size: 1.4vh; color: #fff; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 1px 1px 3px #000; }
        .item-card .fav-badge { position: absolute; top: 5px; right: 5px; color: var(--main-color); font-size: 1.8vh; filter: drop-shadow(0 2px 4px #000); }
        .item-card.playing { border-color: var(--main-color); }
        
        .item-card.focused { border-color: #fff !important; transform: scale(1.08) translateZ(0) !important; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.8) !important; background: #fff !important; }
        .item-card.focused .card-title { color: var(--main-color); }

        .vid-box { width: 100%; height: 45vh; background: #000; position: relative; border-bottom: 1px solid #1a1a1a; overflow: hidden; flex-shrink: 0; }
        #player-container { width:100%; height:100%; background:#000; }
        video { width: 100%; height: 100%; object-fit: fill; background: #000; z-index: 1; }

        .buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .buffer-spinner { font-size: 6vh; color: var(--main-color); }

        .meta { padding: 3vh 2vw; flex: 1; height: 100%; overflow-y: auto; background: #050505; display: flex; flex-direction: column; }
        .meta-title { font-size: 4vh; color: #fff; font-weight: 900; margin-bottom: 1vh; line-height: 1.1; }
        .meta-desc { font-size: var(--font-sm); color: #888; margin-bottom: 2vh; line-height: 1.4; }
        
        .keys { display: flex; justify-content: space-between; align-items: center; gap: 1vw; padding-top: 2vh; border-top: 1px solid #1a1a1a; margin-top: auto; flex-shrink: 0; }
        .key { flex: 1; font-size: 1.5vh; color: #aaa; font-weight: 700; background: #111; border: 1px solid #222; padding: 1.2vh 0.5vw; border-radius: 0.8vh; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        .dot { width: 1.2vh; height: 1.2vh; border-radius: 50%; flex-shrink: 0; margin-right: 0.8vw; }

        #loader { background: #000; z-index: 20000; flex-direction: column; color: var(--main-color); font-weight: 900; font-size: var(--font-lg); }
        #pause-layer { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 9000; align-items: center; justify-content: center; pointer-events: none; }
        
        ::-webkit-scrollbar { width: 0.6vw; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 1vh; }
    </style>
</head>
<body onload="App.init()">

    <div id="loader" class="hide flex-center">
        <i class="fas fa-circle-notch fa-spin" style="margin-bottom:20px; font-size: 8vh;"></i>
        <div id="load-txt">CARREGANDO SISTEMA...</div>
    </div>

    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box">
            <div class="logo-txt"><span style="color:#fff">IPTV</span>&nbsp;<span class="theme-text">OSCORP</span></div>
            <input type="text" id="i0" class="inp focusable" placeholder="URL DNS" autocomplete="off">
            <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO" autocomplete="off">
            <input type="password" id="i2" class="inp focusable" placeholder="SENHA" autocomplete="off">
            <button id="i3" class="btn focusable" onclick="App.login(false)">ENTRAR</button>
            <div id="msg-login" style="color:#ff4444; margin-top:20px; font-size:var(--font-sm); font-weight: 800;"></div>
        </div>
    </div>

    <div id="dash-layer" class="layer hide">
        <div class="top-bar">
            <div class="dash-logo"><span style="color:#fff">IPTV</span>&nbsp;<span class="theme-text">OSCORP</span></div>
            <div class="dash-clock"><div id="clock-time" class="clock-time">--:--</div><div id="clock-date" class="clock-date">--/--/----</div></div>
            <div class="top-actions">
                <div id="m3" class="power-btn focusable" onclick="App.openSettings()">
                    <svg fill="currentColor" height="3vh" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" width="3vh" xmlns="http://www.w3.org/2000/svg">
                      <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49-.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"></path>
                    </svg>
                </div>
                <div id="m4" class="power-btn focusable" onclick="App.logout()"><i class="fas fa-power-off"></i></div>
            </div>
        </div>
        <div class="dash-grid">
            <div id="m0" class="smart-card focusable" role="button" tabindex="-1" onclick="App.openMode('live')">
                <svg fill="currentColor" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 6h-7.59l3.29-3.29L16 2l-4 4-4-4-.71.71L10.59 6H3c-1.1 0-2 .89-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.11-.9-2-2-2zm0 14H3V8h18v12zM9 10v8l7-4z"></path></svg>
                <span id="dash-m0">TV AO VIVO</span>
            </div>
            <div id="m1" class="smart-card focusable" role="button" tabindex="-1" onclick="App.openMode('movie')">
                <svg fill="currentColor" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"></path></svg>
                <span id="dash-m1">FILMES</span>
            </div>
            <div id="m2" class="smart-card focusable" role="button" tabindex="-1" onclick="App.openMode('series')">
                <svg fill="currentColor" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM12 5.5v9l6-4.5z"></path></svg>
                <span id="dash-m2">SÉRIES</span>
            </div>
        </div>
        <div class="bottom-bar">
            <div class="info-pill"><span class="lbl" id="lbl-exp-txt">VENCIMENTO</span><span id="info-exp" class="val">...</span></div>
            <div class="info-pill" style="text-align: right;"><span class="lbl" id="lbl-conn-txt">CONEXÕES</span><span id="info-conn" class="val">...</span></div>
        </div>
    </div>

    <div id="content-layer" class="layer hide">
        <div class="col-cat">
            <div class="cat-head">
                <div class="cat-top-row">
                    <div id="btn-back" class="btn-voltar focusable hide" onclick="App.back()">
                        <svg fill="currentColor" height="1em" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
                    </div>
                    <div id="cat-title-txt" style="flex:1;">MENU</div>
                </div>
                <div id="item-count" style="font-size: 0.7em; margin-top: 5px; opacity: 0.5;">TOTAL: ...</div>
            </div>
            <div id="cat-list" class="cat-list"></div>
        </div>
        
        <div class="col-list">
            <div class="search-area">
                <svg fill="currentColor" stroke="currentColor" stroke-width="0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search" class="inp-search focusable" placeholder="BUSCAR E APERTAR ENTER..." autocomplete="off">
            </div>
            <div id="item-list" class="item-list"></div>
        </div>
        
        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.handleVideoTap(event)">
                <div id="player-container">
                    <video id="player" playsinline webkit-playsinline></video>
                </div>
                <div id="smart-buffer" class="buffer-overlay"><i class="fas fa-circle-notch fa-spin buffer-spinner"></i></div>
                <div id="pause-layer"><i class="fas fa-pause" style="font-size: 10vh; color: #fff; text-shadow: 0 0 20px #000;"></i></div>
            </div>
            
            <div class="meta">
                <div id="meta-title" class="meta-title">SELECIONE UM CANAL OU FILME</div>
                <div id="meta-desc" class="meta-desc"></div>
                
                <div class="keys">
                    <div class="key" id="key-fs"><div class="dot" style="background-color:#FF0000; box-shadow: 0 0 10px #FF0000;"></div> TELA CHEIA</div>
                    <div class="key" id="key-top"><div class="dot" style="background-color:#00C851; box-shadow: 0 0 10px #00C851;"></div> TOPO</div>
                    <div class="key" id="key-search"><div class="dot" style="background-color:#ffbb33; box-shadow: 0 0 10px #ffbb33;"></div> BUSCAR</div>
                    <div class="key" id="key-menu"><div class="dot" style="background-color:#33b5e5; box-shadow: 0 0 10px #33b5e5;"></div> CONFIG</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function safePlay(vidElement) {
            if (!vidElement) return;
            try { var p = vidElement.play(); if (p !== undefined && typeof p.catch === 'function') { p.catch(function(e) {}); } } catch (e) {}
        }
        function requestNativeFullscreen(elem) {
            var target = elem || document.documentElement;
            try { if (target.requestFullscreen) { var p = target.requestFullscreen(); if(p !== undefined && typeof p.catch === 'function') { p.catch(function(){}); } } else if (target.webkitRequestFullscreen) { target.webkitRequestFullscreen(); } } catch (e) {}
        }

        var FavManager = {
            key: 'rc_favs_smart', list: [],
            init: function() { var s = localStorage.getItem(this.key); this.list = s ? JSON.parse(s) : []; },
            toggle: function(id) { var idx = this.list.indexOf(id); if(idx > -1) this.list.splice(idx, 1); else this.list.push(id); localStorage.setItem(this.key, JSON.stringify(this.list)); if (App && App.renderList) App.renderList(); },
            isFav: function(id) { return this.list.indexOf(id) > -1; }
        };

        var PlayerEngine = {
            video: null, url: null, monitorTimer: null, lastTime: 0, stallCount: 0, retryCount: 0, isBuffering: false, maxRetries: 999999,
            init: function() { this.bindVideo(); },
            bindVideo: function() {
                this.video = document.getElementById('player'); if(!this.video) return;
                this.video.onerror = function() { PlayerEngine.handleError(false); };
                this.video.onabort = function() { PlayerEngine.handleError(false); };
                this.video.onstalled = function() { PlayerEngine.showBuffer(); };
                this.video.onended = function() { 
                    if (App.currentMode === 'series' && App.fullData && App.fullData[App.idx] && App.fullData[App.idx].is_episode) {
                        var nextIdx = App.idx + 1;
                        if (nextIdx < App.fullData.length) { setTimeout(function() { App.itemClick(nextIdx, true); }, 50); return; }
                    }
                    PlayerEngine.handleError(false); 
                };
                this.video.addEventListener('playing', function() { PlayerEngine.onPlaySuccess(); });
                this.video.addEventListener('waiting', function() { PlayerEngine.showBuffer(); });
                this.video.controls = false;
            },
            resetDOM: function() { if(this.video) { try { this.video.pause(); } catch(e){} this.video.removeAttribute('src'); this.video.load(); } },
            play: function(url) {
                if (!url) return;
                if(this.url === url && !this.video.error) { if(this.video.paused) safePlay(this.video); return; }
                if (this.url && this.url !== url) { this.hardStop(); this.resetDOM(); }
                this.url = url; this.stallCount = 0; this.retryCount = 0; this.showBuffer();
                document.getElementById('pause-layer').style.display = 'none';
                if(this.video) { this.video.src = url; safePlay(this.video); }
                this.startMonitor();
            },
            onPlaySuccess: function() { this.stallCount = 0; this.retryCount = 0; this.hideBuffer(); },
            showBuffer: function() { this.isBuffering = true; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'flex'; },
            hideBuffer: function() { this.isBuffering = false; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'none'; },
            startMonitor: function() {
                this.stopMonitor();
                this.monitorTimer = setInterval(function() {

                if(this.zone===3) { this.zone=2; this.updateFocus(); return; }
                if(this.zone===2) { 
                    if(App.currentMode === 'series' && App.fullData.length > 0 && App.fullData[0].is_episode) { App.fullData = App.seriesDataCache; App.idx = App.lastSeriesIdx; App.showingEpisodes = false; App.renderList(); App.updateFocus(); return; } 
                    this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); this.updateFocus(); return; 
                }
                if(this.zone===1) { this.zone=2; this.idx=0; this.updateFocus(); return; }
                if(this.zone===0) { this.setScr(1); return; }
            },
            
            updateFocus: function() {
                var focusedItems = document.querySelectorAll('.focused'); for(var k=0; k<focusedItems.length; k++) { focusedItems[k].classList.remove('focused'); }
                var el; if(this.scr===0) el=document.getElementById('i'+this.idx); if(this.scr===1) el=document.getElementById('m'+this.idx);
                if(this.scr===2) { if(this.zone===0) el=document.getElementById('c'+this.idx); if(this.zone===1) el=document.getElementById('search'); if(this.zone===2) el=document.getElementById('row-'+this.idx); if(this.zone===3) el=document.getElementById('vid-box'); }
                
                if(el) { 
                    el.classList.add('focused'); 
                    if(el.tagName==='INPUT') { try { el.focus({preventScroll:true}); } catch(e) { el.focus(); } } 
                    else { var inps = document.querySelectorAll('input'); for(var i=0; i<inps.length; i++) { inps[i].blur(); } if (document.activeElement && document.activeElement !== document.body) { try { document.activeElement.blur(); } catch(e) {} } } 
                    
                    if(el.tagName!=='INPUT') {
                        var parentContainer = el.parentElement;
                        while(parentContainer && parentContainer !== document.body) {
                            var style = window.getComputedStyle(parentContainer);
                            if(style.overflowY === 'auto' || style.overflowY === 'scroll') {
                                try { parentContainer.scrollTo({ top: el.offsetTop - (parentContainer.clientHeight / 2) + (el.clientHeight / 2), behavior: 'smooth' }); } 
                                catch(e) { parentContainer.scrollTop = el.offsetTop - (parentContainer.clientHeight / 2) + (el.clientHeight / 2); } break;
                            }
                            parentContainer = parentContainer.parentElement;
                        }
                    }
                }
            },
            
            move: function(d) {
                var s = this.scr;
                if(s===0) { if(d===1 && this.idx < 3) this.idx++; if(d===0 && this.idx > 0) this.idx--; }
                else if(s===1) { if(this.idx === 0) { if(d===3) this.idx=1; else if(d===0) this.idx=3; } else if(this.idx === 1) { if(d===3) this.idx=2; else if(d===2) this.idx=0; else if(d===0) this.idx=3; } else if(this.idx === 2) { if(d===2) this.idx=1; else if(d===0) this.idx=3; } else if(this.idx === 3) { if(d===3) this.idx=4; else if(d===1) this.idx=0; } else if(this.idx === 4) { if(d===2) this.idx=3; else if(d===1) this.idx=2; } }
                else if(s===2) {
                    if(this.zone===3) { if(d===2) { this.zone=2; this.updateFocus(); } return; }
                    if(this.zone===0) { var max = document.getElementById('cat-list').children.length-1; if(d===1 && this.idx<max) this.idx++; if(d===0 && this.idx>0) this.idx--; if(d===3 && App.fullData.length>0) { this.zone=2; this.idx=0; App.renderList(); } }
                    else if(this.zone===2) { 
                        var dataLen = App.fullData.length;
                        var isGrid = (App.currentMode === 'movie' || App.currentMode === 'series') && !App.showingEpisodes;
                        
                        if(d===1) { // DOWN
                            if(isGrid) { if(this.idx + this.gridCols < dataLen) { this.idx += this.gridCols; this.renderList(); } else { this.idx = dataLen - 1; this.renderList(); } }
                            else { if(this.idx < dataLen - 1) { this.idx++; this.renderList(); } }
                        }
                        else if(d===0) { // UP
                            if(isGrid) { if(this.idx - this.gridCols >= 0) { this.idx -= this.gridCols; this.renderList(); } else { this.zone = 1; } }
                            else { if(this.idx > 0) { this.idx--; this.renderList(); } else if(this.idx === 0) { this.zone = 1; } }
                        } 
                        else if(d===3) { // RIGHT
                            if(isGrid) { if((this.idx + 1) % this.gridCols !== 0 && this.idx + 1 < dataLen) { this.idx++; this.renderList(); } }
                            else { this.zone=3; }
                        }
                        else if(d===2) { // LEFT
                            if(isGrid && this.idx % this.gridCols !== 0) { this.idx--; this.renderList(); }
                            else { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); }
                        }
                    } else if(this.zone===1) { if(d===1) { this.zone=2; this.idx=0; } if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } }
                }
                this.updateFocus();
            },

            enter: function() {
                var now = new Date().getTime(); if(now - this.lastEnter < 400) return; this.lastEnter = now;
                var currentScr = this.scr; 
                if(currentScr===0) { if(this.idx === 3) this.login(false); else if(this.idx < 3) this.move(1); }
                else if(currentScr===1) { if(this.idx === 4) this.logout(); else if(this.idx === 0) this.openMode('live', true); else if(this.idx === 1) this.openMode('movie', true); else if(this.idx === 2) this.openMode('series', true); }
                else if(currentScr===2) { if(this.zone===0) this.catClick(this.idx, true); else if(this.zone===1) this.doSearch(true); else if(this.zone===2) { this.clickItem(); } else if(this.zone===3) this.toggleFull(); }
            }
        };

        document.addEventListener('keydown', function(e) {
            var k = e.keyCode;
            
            var isLeft = (k===37); var isUp = (k===38); var isRight = (k===39); var isDown = (k===40);
            var isEnter = (k===13 || k===295); var isBack = (k===8 || k===27 || k===461 || k===10009 || k===88); 
            var isRed = (k===403 || k===82); var isGreen = (k===404 || k===71); var isYellow = (k===405 || k===89); var isBlue = (k===406 || k===66 || k===275); 

            // Tratamento Estrito de Busca (Search Lock)
            // Impede busca enquanto digita - Dispara busca Global EXCLUSIVAMENTE ao apertar Enter no Input
            if(App.scr === 2 && document.activeElement && document.activeElement.id === 'search') { 
                if(isEnter) { e.preventDefault(); App.doSearch(true); return; } 
                if(isDown) { e.preventDefault(); App.zone=2; App.idx=0; App.updateFocus(); return; } 
                if(isLeft || isRight) { return; } 
                return; 
            }
            if(document.activeElement && document.activeElement.tagName === 'INPUT' && App.scr === 0) { if(isEnter || isDown) { e.preventDefault(); App.move(1); return; } if(isUp) { e.preventDefault(); App.move(0); return; } return; }

            if(k===48 || k===96) { if(App.scr===2 && App.zone===2) { var it=App.fullData[App.idx]; if(it) { var itId = it.stream_id || it.series_id || it.id; FavManager.toggle(itId); } } }
            
            var isVOD = (App.currentMode !== 'live' && App.scr === 2); var isFull = document.getElementById('vid-box').classList.contains('fs');
            if(isVOD) { if(k===415 || k===179 || k===19) { e.preventDefault(); App.togglePlay(); return; } if(k===412 || k===227) { e.preventDefault(); App.seek(-15); return; } if(k===417 || k===228) { e.preventDefault(); App.seek(15); return; } if(isEnter && isFull) { e.preventDefault(); App.togglePlay(); return; } }
            
            if(isFull) { e.preventDefault(); if(isRed || isBack) { App.exitFull(); return; } if(isVOD) { if(isLeft) { App.seek(-15); return; } if(isRight) { App.seek(15); return; } } return; }
            
            if(isLeft) { e.preventDefault(); App.move(2); } if(isUp) { e.preventDefault(); App.move(0); } if(isRight) { e.preventDefault(); App.move(3); } if(isDown) { e.preventDefault(); App.move(1); }
            if(isEnter) { e.preventDefault(); App.enter(); } 
            if(isBack) { e.preventDefault(); if(App.scr>0) { App.back(true); return; } }
            
            if(isRed) if(App.scr===2) App.toggleFull(); if(isGreen) if(App.scr===2) { App.zone=0; App.idx=0; App.updateFocus(); } if(isYellow) if(App.scr===2) { App.zone=1; App.updateFocus(); } if(isBlue) { e.preventDefault(); if(App.scr===1) App.setScr(2); } 
        });
    </script>
</body>
