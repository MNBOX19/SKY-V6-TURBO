<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>IPTV PHILCO MAX - LIVE TV</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILO STB - FOCO NA PERFORMANCE. SEM ANIMAÇÕES, SEM TRANSITIONS, SEM SHADOWS. */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;           
        }
        
        html, body {
            background: #000000; color: #ffffff; font-family: 'Montserrat', sans-serif;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; 
            overflow: hidden !important; touch-action: none;
        }

        .hide { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: #000; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; z-index: 999999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .splash-logo { font-size: 8vh; font-weight: 900; text-align: center; color: #FFD700; }
        .splash-msg { margin-top: 4vh; font-size: 3vh; color: #fff; font-weight: 600; }

        #orientation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; flex-direction: column; align-items: center; justify-content: center;
            color: #FFD700; text-align: center; font-weight: 900; font-size: 3vh;
        }
        @media screen and (max-width: 768px) and (orientation: portrait) { #orientation-overlay { display: flex !important; } }

        /* --- NAVEGAÇÃO STB --- */
        .focused { 
            background: #FFD700 !important; color: #000 !important; 
            border: 2px solid #fff !important; z-index: 50;
        }
        .focused i, .focused span, .focused div { color: #000 !important; }
        
        #vid-box.focused { border: 4px solid #FFD700 !important; background: transparent !important; }
        #vid-box.fs, #vid-box.fs.focused { border: none !important; width: 100% !important; height: 100% !important; z-index: 9999 !important; position: fixed !important; top: 0 !important; left: 0 !important; background: #000 !important; }

        .login-box { width: 450px; max-width: 90%; padding: 40px; background: #0a0a0a; border: 2px solid #FFD700; border-radius: 4px; text-align: center; }
        .logo-txt { font-size: 4vh; font-weight: 900; margin-bottom: 3vh; }
        .theme-text { color: #FFD700; }
        .inp { width: 100%; padding: 16px; margin: 10px 0; background: #1a1a1a; border: 2px solid #333; color: #fff; text-align: center; font-weight: 800; border-radius: 4px; font-size: 2vh; }
        .btn { width: 100%; padding: 16px; margin-top: 20px; background: #1a1a1a; color: #fff; border: 2px solid #333; font-weight: 900; border-radius: 4px; font-size: 2vh; text-transform: uppercase; }
        
        .config-row { display: flex; gap: 1vw; margin: 2vh 0; }
        .toggle-btn { flex: 1; padding: 1.5vh; background: #1a1a1a; border: 2px solid #333; color: #fff; font-size: 2.2vh; font-weight: 800; border-radius: 4px; }
        .info-row { display: flex; justify-content: space-between; padding: 1vh 0; border-bottom: 2px solid #222; font-size: 2.2vh; color: #ccc; }

        #content-layer { display: flex; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .col-cat { width: 25%; background: #050505; display: flex; flex-direction: column; border-right: 2px solid #1a1a1a; height: 100%; }
        .col-list { width: 35%; background: #0a0a0a; display: flex; flex-direction: column; border-right: 2px solid #1a1a1a; height: 100%; }
        .col-play { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; height: 100%; }

        .cat-head { padding: 15px; background: #111; color: #FFD700; border-bottom: 2px solid #222; text-align: center; font-size: 3vh; font-weight: 900; }
        
        /* Sem rolagem suave nativa. Tudo via JavaScript STB Block */
        .cat-list, .item-list { flex: 1; height: 100%; overflow: hidden; }
        
        .cat-item, .item { padding: 14px 20px; border-bottom: 2px solid #111; color: #aaa; font-size: 2.2vh; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 4px solid transparent; }
        .cat-item.active { background: #1a1a1a; color: #fff; border-left: 4px solid #FFD700; }
        .item.playing { color: #FFD700; background: #111; border-left: 4px solid #FFD700; }
        
        .search-area { padding: 15px; background: #111; border-bottom: 2px solid #222; }
        .inp-search { width: 100%; padding: 12px; background: #050505; border: 2px solid #333; color: #fff; font-size: 2.2vh; font-weight: 800; text-transform: uppercase; text-align: center; }
        
        .fav-icon { float: right; color: #FFD700; }

        .vid-box { width: 100%; height: 50vh; background: #000; position: relative; border-bottom: 2px solid #222; flex-shrink: 0; }
        #player-container { width:100%; height:100%; background:#000; }
        video { width: 100%; height: 100%; object-fit: fill; background: #000; }

        .buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .buffer-spinner { font-size: 4vh; color: #FFD700; font-weight: bold; }

        .meta { padding: 25px; flex: 1; overflow: hidden; background: #050505; display: flex; flex-direction: column; }
        .meta-title { font-size: 4vh; color: #FFD700; font-weight: 900; margin-bottom: 1vh; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .user-info-bar { display: flex; justify-content: space-around; background: #111; border: 2px solid #222; padding: 1.5vh 1vw; margin-top: auto; margin-bottom: 2vh; font-size: 1.8vh; font-weight: 800; color: #888; gap: 1vw; }
        .user-info-bar .val { color: #FFD700; margin-left: 0.5vw; }

        .keys { display: flex; justify-content: space-between; align-items: center; gap: 1vw; padding-top: 2vh; border-top: 2px solid #1a1a1a; }
        .key { flex: 1; font-size: 1.8vh; color: #ccc; font-weight: 800; background: #111; border: 2px solid #222; padding: 1vh 0.5vw; text-align: center; white-space: nowrap; }
        .color-dot { display: inline-block; width: 1.5vh; height: 1.5vh; margin-right: 0.5vw; vertical-align: middle; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onload="App.init()">

    <div id="splash-screen">
        <div class="splash-logo">IPTV PHILCO MAX</div>
        <div class="splash-msg" id="splash-msg">CARREGANDO SISTEMA...</div>
    </div>

    <div id="orientation-overlay">
        <div>POR FAVOR<br><span style="color: #FFD700;">GIRE A TELA</span></div>
    </div>

    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box">
            <div class="logo-txt"><span style="color:#fff">ACESSO</span> <span class="theme-text">STB</span></div>
            <input type="text" id="i0" class="inp focusable" placeholder="URL SERVIDOR" autocomplete="off">
            <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO" autocomplete="off">
            <input type="password" id="i2" class="inp focusable" placeholder="SENHA" autocomplete="off">
            <button id="i3" class="btn focusable" onclick="App.login(false)">CONECTAR</button>
            <div id="msg-login" style="color:#FFD700; margin-top:20px; font-size:2vh; font-weight: 900;"></div>
        </div>
    </div>

    <div id="settings-layer" class="layer hide flex-center">
        <div class="login-box">
            <div class="logo-txt"><span class="theme-text">INFORMAÇÕES</span></div>
            <div class="info-row"><span>USUÁRIO:</span> <span id="set-user">...</span></div>
            <div class="info-row"><span>VENCIMENTO:</span> <span id="set-exp">...</span></div>
            <div class="info-row"><span>CONEXÕES:</span> <span id="set-conn">...</span></div>
            
            <div class="config-row" style="margin-top: 30px;">
                <div id="s0" class="toggle-btn focusable" onclick="App.toggleCfg('filter')">CONTEÚDO ADULTO: <span id="lbl-filter" style="color:#FFD700">BLOQUEADO</span></div>
            </div>
            <div class="config-row">
                <div id="s1" class="toggle-btn focusable" onclick="App.toggleFormat()">FORMATO: <span id="lbl-format" style="color:#FFD700">TS NAT</span></div>
            </div>
            
            <button id="s2" class="btn focusable" onclick="App.closeSettings()" style="border-color: #FFD700; color: #FFD700;">VOLTAR PARA CANAIS</button>
            <button id="s3" class="btn focusable" onclick="App.logout()">DESCONECTAR CONTA</button>
        </div>
    </div>

    <div id="content-layer" class="layer hide">
        <div class="col-cat">
            <div class="cat-head">
                <div>MENU</div>
                <div id="item-count" style="font-size: 1.5vh; margin-top: 5px; color:#aaa;">AGUARDE...</div>
            </div>
            <div id="cat-list" class="cat-list"></div>
        </div>
        
        <div class="col-list">
            <div class="search-area"><input type="text" id="search" class="inp-search focusable" placeholder="DIGITE PARA BUSCAR..." autocomplete="off"></div>
            <div id="item-list" class="item-list"></div>
        </div>
        
        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.handleVideoTap(event)">
                <div id="player-container">
                    <video id="player" playsinline webkit-playsinline></video>
                </div>
                
                <div id="smart-buffer" class="buffer-overlay">
                    <div class="buffer-spinner">CARREGANDO VÍDEO...</div>
                </div>
            </div>
            
            <div class="meta">
                <div id="meta-title" class="meta-title">IPTV PHILCO MAX</div>
                
                <div class="user-info-bar" id="osd-info-bar">
                    <div>USUÁRIO: <span id="osd-user" class="val">...</span></div>
                    <div>VENCIMENTO: <span id="osd-exp" class="val">...</span></div>
                </div>

                <div class="keys">
                    <div class="key" id="key-fs"><span class="color-dot" style="background-color:#FF0000;"></span> TELA CHEIA</div>
                    <div class="key" id="key-top"><span class="color-dot" style="background-color:#00C851;"></span> INÍCIO</div>
                    <div class="key" id="key-search"><span class="color-dot" style="background-color:#ffbb33;"></span> BUSCA</div>
                    <div class="key" id="key-menu"><span class="color-dot" style="background-color:#33b5e5;"></span> OPÇÕES</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Funções Base Compatíveis com Aparelhos Antigos
        function safePlay(vidElement) {
            if (!vidElement) return;
            try { var p = vidElement.play(); if (p !== undefined && typeof p.catch === 'function') { p.catch(function(){}); } } catch (e) {}
        }

        function requestNativeFullscreen(elem) {
            var target = elem || document.documentElement;
            try {
                if (target.requestFullscreen) { var p = target.requestFullscreen(); if(p !== undefined && typeof p.catch === 'function') { p.catch(function(){}); } } 
                else if (target.webkitRequestFullscreen) { target.webkitRequestFullscreen(); }
            } catch (e) {}
        }

        var FavManager = {
            key: 'rc_favs_smart_live', list: [],
            init: function() { var s = localStorage.getItem(this.key); this.list = s ? JSON.parse(s) : []; },
            toggle: function(id) { var idx = this.list.indexOf(id); if(idx > -1) this.list.splice(idx, 1); else this.list.push(id); localStorage.setItem(this.key, JSON.stringify(this.list)); if (App && App.renderList) App.renderList(false); },
            isFav: function(id) { return this.list.indexOf(id) > -1; }
        };

        var PlayerEngine = {
            video: null, url: null, monitorTimer: null, lastTime: 0, stallCount: 0, retryCount: 0, maxRetries: 5,
            init: function() { this.bindVideo(); },
            bindVideo: function() {
                this.video = document.getElementById('player'); if(!this.video) return;
                this.video.onerror = function() { PlayerEngine.handleError(); };
                this.video.onabort = function() { PlayerEngine.handleError(); };
                this.video.onstalled = function() { PlayerEngine.showBuffer(); };
                this.video.onended = function() { PlayerEngine.handleError(); };
                this.video.addEventListener('playing', function() { PlayerEngine.onPlaySuccess(); });
                this.video.addEventListener('waiting', function() { PlayerEngine.showBuffer(); });
                this.video.controls = false;
            },
            resetDOM: function() {
                if(this.video) { try { this.video.pause(); } catch(e){} this.video.removeAttribute('src'); this.video.load(); }
            },
            play: function(url) {
                if (!url) return;
                if(this.url === url && !this.video.error && !this.video.paused) return;
                this.hardStop(); this.url = url; this.stallCount = 0; this.retryCount = 0;
                this.showBuffer();
                if(this.video) { this.video.src = url; safePlay(this.video); }
                this.startMonitor();
            },
            onPlaySuccess: function() { this.stallCount = 0; this.retryCount = 0; this.hideBuffer(); },
            showBuffer: function() { var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'flex'; },
            hideBuffer: function() { var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'none'; },
            startMonitor: function() {
                this.stopMonitor();
                this.monitorTimer = setInterval(function() {
                    var v = PlayerEngine.video; if(!v || !PlayerEngine.url || v.paused) return;
                    if(Math.abs(v.currentTime - PlayerEngine.lastTime) < 0.1) {
                        PlayerEngine.stallCount++;
                        if(PlayerEngine.stallCount > 2) PlayerEngine.showBuffer();
                        if(PlayerEngine.stallCount > 5) { PlayerEngine.stallCount = 0; PlayerEngine.handleError(); }
                    } else { PlayerEngine.stallCount = 0; PlayerEngine.lastTime = v.currentTime; PlayerEngine.hideBuffer(); }
                }, 2000);
            },
            stopMonitor: function() { if(this.monitorTimer) clearInterval(this.monitorTimer); },
            handleError: function() {
                if (this.retryCount < this.maxRetries) {
                    this.retryCount++; this.showBuffer(); this.resetDOM();
                    setTimeout(function() { if(PlayerEngine.video && PlayerEngine.url) { PlayerEngine.video.src = PlayerEngine.url; safePlay(PlayerEngine.video); } }, 2000);
                } else { this.hardStop(); document.getElementById('smart-buffer').innerHTML = '<div class="buffer-spinner" style="color:red;">FALHA NO SINAL</div>'; document.getElementById('smart-buffer').style.display = 'flex'; }
            },
            hardStop: function() { this.stopMonitor(); this.resetDOM(); this.url = null; this.hideBuffer(); }
        };

        var App = {
            scr: 0, zone: 0, idx: 0, lastCatIdx: -1, creds: {}, fullData: [], playingId: null,
            cfg: { filter: true, format: 'ts_native' }, renderLimit: 150,

            removeAccents: function(s) { 
                if(!s) return ""; 
                return s.toLowerCase().replace(/[áàãâä]/g, 'a').replace(/[éèêë]/g, 'e').replace(/[íìîï]/g, 'i').replace(/[óòõôö]/g, 'o').replace(/[úùûü]/g, 'u').replace(/[ç]/g, 'c'); 
            },

            init: function() {
                FavManager.init(); 
                if(localStorage.getItem('rc_cfg_filter')) this.cfg.filter = (localStorage.getItem('rc_cfg_filter') === 'true');
                var savedFmt = localStorage.getItem('rc_cfg_format'); this.cfg.format = (savedFmt === 'm3u8_native' || savedFmt === 'ts_native') ? savedFmt : 'ts_native';
                
                PlayerEngine.init(); this.updateCfgUI();
                
                if(localStorage.getItem('rc_h')) {
                    document.getElementById('i0').value = localStorage.getItem('rc_h'); document.getElementById('i1').value = localStorage.getItem('rc_u'); document.getElementById('i2').value = localStorage.getItem('rc_p');
                    App.login(true);
                } else { 
                    setTimeout(function() { document.getElementById('splash-screen').style.display = 'none'; App.setScr(0); }, 1000);
                }
            },

            toggleCfg: function(type) { if(type === 'filter') { this.cfg.filter = !this.cfg.filter; localStorage.setItem('rc_cfg_filter', this.cfg.filter); } this.updateCfgUI(); },
            toggleFormat: function() { this.cfg.format = (this.cfg.format === 'ts_native') ? 'm3u8_native' : 'ts_native'; localStorage.setItem('rc_cfg_format', this.cfg.format); this.updateCfgUI(); },
            updateCfgUI: function() { 
                document.getElementById('lbl-filter').innerText = this.cfg.filter ? "BLOQUEADO" : "LIBERADO"; 
                document.getElementById('lbl-filter').style.color = this.cfg.filter ? "#FF0000" : "#00C851"; 
                document.getElementById('lbl-format').innerText = this.cfg.format === 'm3u8_native' ? "M3U8 NAT" : "TS NAT"; 
            },
            
            req: function(url, cb) { 
                var x = new XMLHttpRequest(); 
                x.open("GET", url + '&_t=' + new Date().getTime(), true); x.timeout = 15000; 
                x.onload = function() { if(x.status===200) { try { cb(JSON.parse(x.responseText)); } catch(e) { cb(null); } } else { cb(null); } }; 
                x.onerror = x.ontimeout = function() { cb('ERR_NET'); }; x.send(); 
            },

            login: function(isAuto) {
                var h = document.getElementById('i0').value.trim(); var u = document.getElementById('i1').value.trim(); var p = document.getElementById('i2').value.trim();
                if(h.charAt(h.length - 1) === '/') h = h.slice(0, -1); 
                if(h.indexOf('http') === -1) h = 'http://' + h;
                
                document.getElementById('splash-screen').style.display = 'flex';
                document.getElementById('splash-msg').innerText = "AUTENTICANDO DADOS...";

                this.req(h+"/player_api.php?username="+u+"&password="+p, function(d){
                    document.getElementById('splash-screen').style.display = 'none';
                    if(d === 'ERR_NET') { 
                        if(isAuto) { document.getElementById('splash-screen').style.display = 'flex'; document.getElementById('splash-msg').innerText = "FALHA DE REDE. TENTANDO NOVAMENTE..."; setTimeout(function(){ App.login(true); }, 5000); } 
                        else { App.setScr(0); document.getElementById('msg-login').innerText = "FALHA DE CONEXÃO COM A INTERNET"; } return; 
                    }
                    if(d && d.user_info && d.user_info.auth==1) {
                        App.creds={h:h,u:u,p:p}; localStorage.setItem('rc_h', h); localStorage.setItem('rc_u', u); localStorage.setItem('rc_p', p); var info = d.user_info;
                        var exp = info.exp_date ? new Date(info.exp_date*1000).toLocaleDateString() : "ILIMITADO"; 
                        var connStr = (info.active_cons || 0) + " DE " + (info.max_connections || 1);

                        document.getElementById('set-user').innerText = info.username || u; document.getElementById('set-exp').innerText = exp; document.getElementById('set-conn').innerText = connStr; 
                        document.getElementById('osd-user').innerText = info.username || u; document.getElementById('osd-exp').innerText = exp;
                        App.openMode();
                    } else { App.setScr(0); document.getElementById('msg-login').innerText = "USUÁRIO OU SENHA INVÁLIDOS"; localStorage.clear(); }
                });
            },
            logout: function() { PlayerEngine.hardStop(); localStorage.clear(); location.reload(); },

            setScr: function(n) {
                if(n===2) { PlayerEngine.hardStop(); }
                var layers = document.querySelectorAll('.layer'); for(var i=0; i<layers.length; i++) { layers[i].classList.add('hide'); }
                if(n===0) document.getElementById('login-layer').classList.remove('hide'); 
                if(n===2) document.getElementById('content-layer').classList.remove('hide');
                if(n===3) document.getElementById('settings-layer').classList.remove('hide');
                this.scr=n; this.zone=0; this.idx=0; this.updateFocus();
            },

            openSettings: function() { this.setScr(3); this.idx = 0; this.updateFocus(); }, 
            closeSettings: function() { App.openMode(); },

            countGlobal: function() {
                document.getElementById('item-count').innerText = "CONTANDO...";
                this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_streams", function(d){
                    if(d && d!=='ERR_NET') {
                        var total = 0; var junk = ['adulto','xxx','sex','porn','+18'];
                        if(App.cfg.filter) { for(var i=0; i<d.length; i++) { var nome = (d[i].name || d[i].title || "").toLowerCase(); var show = true; for(var j=0; j<junk.length; j++) { if(nome.indexOf(junk[j]) > -1) { show = false; break; } } if(show) total++; } } else { total = d.length; }
                        document.getElementById('item-count').innerText = "TOTAL: " + total + " CANAIS";
                    }
                });
            },

            openMode: function() {
                this.fullData = []; this.lastCatIdx = -1;
                document.getElementById('cat-list').innerHTML = ''; document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center; color:#aaa; font-weight: bold; font-size: 2.5vh; margin-top: 5vh;">&larr; ESCOLHA UMA CATEGORIA</div>';
                PlayerEngine.hardStop(); requestNativeFullscreen();
                this.playingId = null; this.setScr(2);
                document.getElementById('search').value = ''; this.countGlobal(); 
                
                this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_categories", function(d){
                    if(d && d!=='ERR_NET') { 
                        var h = []; h.push('<div class="cat-item" id="c0" data-id="fav">⭐ FAVORITOS</div>'); 
                        var count = 0; var junk = ['adulto','xxx','sex','porn','+18'];
                        for(var i=0;i<d.length;i++) {
                            var nome = d[i].category_name; var show = true;
                            if(App.cfg.filter) { var lower = nome.toLowerCase(); for(var j=0; j<junk.length; j++) { if(lower.indexOf(junk[j]) > -1) { show = false; break; } } }
                            if(show) { count++; h.push('<div class="cat-item" id="c'+count+'" data-id="'+d[i].category_id+'">'+nome+'</div>'); }
                        }
                        document.getElementById('cat-list').innerHTML = h.join(''); App.zone=0; App.idx=0; App.updateFocus();
                    }
                });
            },
            
            loadContent: function(catIdx) {
                if (catIdx === -1) return; document.getElementById('item-list').innerHTML = ''; this.lastCatIdx = catIdx; 
                var el = document.getElementById('c'+catIdx); if(!el) return;
                var cid = el.getAttribute('data-id'); 
                var catItems = document.querySelectorAll('.cat-item'); for(var j=0; j<catItems.length; j++) { catItems[j].classList.remove('active'); } el.classList.add('active');
                
                document.getElementById('search').value = ''; document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center; color: #FFD700; font-weight:bold;">CARREGANDO CANAIS...</div>';

                var onData = function(d) { 
                    if(d && d!=='ERR_NET') { 
                        var junk = ['adulto','xxx','sex','porn','+18']; App.fullData = []; var isFilter = App.cfg.filter;
                        for(var k=0; k<d.length; k++) { 
                            var nome = d[k].name || d[k].title || ""; d[k]._sn = App.removeAccents(nome);
                            var show = true; if(isFilter) { for(var j=0; j<junk.length; j++) { if(d[k]._sn.indexOf(junk[j]) > -1) { show = false; break; } } } 
                            if(show) App.fullData.push(d[k]); 
                        }
                        if(App.fullData.length > 0) { App.zone = 2; App.idx = 0; }
                        App.renderList(); 
                    } else { document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center;">CATEGORIA VAZIA</div>'; }
                };

                if(cid === 'fav') { 
                    this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_streams", function(d){ 
                        if(d && d!=='ERR_NET') { 
                            App.fullData = [];
                            for(var x=0; x<d.length; x++) { var fId = d[x].stream_id || d[x].id; if(FavManager.isFav(fId)) { d[x]._sn = App.removeAccents(d[x].name || d[x].title || ""); App.fullData.push(d[x]); } }
                            if(App.fullData.length > 0) { App.zone = 2; App.idx = 0; } App.renderList(); 
                        } 
                    }); 
                } 
                else { this.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_live_streams&category_id="+cid, onData); }
            },

            renderList: function() {
                var d = this.fullData; if(!d) return; var max = d.length; var listEl = document.getElementById('item-list'); 
                if(max===0) { listEl.innerHTML = '<div style="padding:20px; text-align:center;">NENHUM CANAL ENCONTRADO</div>'; return; }
                
                var h = [];
                for(var i = 0; i < max; i++) {
                    var n = d[i].name || d[i].title; var id = d[i].stream_id || d[i].id; var icn = FavManager.isFav(id) ? '<i class="fas fa-star fav-icon"></i>' : '';
                    var playingClass = (App.playingId == id) ? ' playing' : ''; 
                    h.push('<div class="item' + playingClass + '" id="row-'+i+'">'+n+icn+'</div>');
                }
                listEl.innerHTML = h.join(''); this.updateFocus();
            },
            
            clickItem: function() { 
                var item = this.fullData[this.idx]; 
                if(item) { 
                    var id = item.stream_id || item.id; var ext = this.cfg.format === 'm3u8_native' ? 'm3u8' : 'ts'; 
                    var url = this.creds.h+"/live/"+this.creds.u+"/"+this.creds.p+"/"+id+"."+ext;
                    this.playingId = id; document.getElementById('meta-title').innerText = item.name || item.title; 
                    PlayerEngine.play(url); 
                    var items = document.querySelectorAll('.item'); for(var k=0; k<items.length; k++) { items[k].classList.remove('playing'); }
                    var r = document.getElementById('row-'+this.idx); if(r) r.classList.add('playing'); 
                    this.toggleFull();
                } 
            },

            switchChannel: function(dir) {
                if (!this.fullData || this.fullData.length === 0) return;
                this.idx += dir;
                if (this.idx < 0) this.idx = this.fullData.length - 1;
                if (this.idx >= this.fullData.length) this.idx = 0;
                this.zone = 2; this.updateFocus(); this.clickItem();
            },

            doSearch: function() {
                var rawT = document.getElementById('search').value; 
                if(rawT.length === 0) { if(App.lastCatIdx > -1) { App.loadContent(App.lastCatIdx); } return; }
                if(rawT.length < 2) return; var tStr = App.removeAccents(rawT); var listEl = document.getElementById('item-list');
                
                listEl.innerHTML = '<div style="padding:20px; text-align:center; color: #FFD700; font-weight:bold;">BUSCANDO NO SERVIDOR...</div>';
                App.req(App.creds.h+"/player_api.php?username="+App.creds.u+"&password="+App.creds.p+"&action=get_live_streams", function(d) { 
                    if(d && d !== 'ERR_NET') { 
                        var res = []; var junk = ['adulto','xxx','sex','porn','+18'];
                        for(var i=0; i<d.length; i++) { 
                            var nome = d[i].name || d[i].title || ""; d[i]._sn = App.removeAccents(nome); var show = true;
                            if(App.cfg.filter) { for(var j=0; j<junk.length; j++) { if(d[i]._sn.indexOf(junk[j]) > -1) { show = false; break; } } }
                            if(show && d[i]._sn.indexOf(tStr) > -1) { res.push(d[i]); if(res.length >= 100) break; } 
                        }
                        if (res.length > 0) { App.fullData = res; App.zone = 2; App.idx = 0; App.renderList(); } 
                        else { listEl.innerHTML = '<div style="padding:20px; text-align:center;">NENHUM RESULTADO.</div>'; }
                    }
                });
            },
            
            toggleFull: function() { if(!this.playingId) return; var b = document.getElementById('vid-box'); if(b.classList.contains('fs')) { this.exitFull(); } else { b.classList.add('fs'); this.zone = 3; this.updateFocus(); } },
            exitFull: function() { document.getElementById('vid-box').classList.remove('fs'); this.zone = 2; this.updateFocus(); },
            
            // Controle Lógico de Rolagem Seca STB
            updateFocus: function() {
                var focusedItems = document.querySelectorAll('.focused'); for(var k=0; k<focusedItems.length; k++) { focusedItems[k].classList.remove('focused'); }
                var el; if(this.scr===0) el=document.getElementById('i'+this.idx); if(this.scr===3) el=document.getElementById('s'+this.idx);
                if(this.scr===2) { if(this.zone===0) el=document.getElementById('c'+this.idx); if(this.zone===1) el=document.getElementById('search'); if(this.zone===2) el=document.getElementById('row-'+this.idx); if(this.zone===3) el=document.getElementById('vid-box'); }
                
                if(el) { 
                    el.classList.add('focused'); 
                    if(el.tagName==='INPUT') { try { el.focus({preventScroll:true}); } catch(e) { el.focus(); } } 
                    else { if (document.activeElement && document.activeElement !== document.body) { try { document.activeElement.blur(); } catch(e) {} } } 
                    
                    // Cálculo de Movimentação em Bloco Seco (STB Style)
                    if(el.tagName!=='INPUT') {
                        var parentContainer = el.parentElement;
                        if(parentContainer && (parentContainer.id === 'item-list' || parentContainer.id === 'cat-list')) {
                            var itemTop = el.offsetTop;
                            var itemHeight = el.clientHeight;
                            var parentHeight = parentContainer.clientHeight;
                            var currentScroll = parentContainer.scrollTop;

                            if (itemTop < currentScroll) {
                                parentContainer.scrollTop = itemTop;
                            } else if (itemTop + itemHeight > currentScroll + parentHeight) {
                                parentContainer.scrollTop = itemTop + itemHeight - parentHeight;
                            }
                        }
                    }
                }
            },
            
            move: function(d) {
                var s = this.scr;
                if(s===0) { if(d===1 && this.idx < 3) this.idx++; if(d===0 && this.idx > 0) this.idx--; }
                else if(s===3) { if(d===1 && this.idx < 3) this.idx++; if(d===0 && this.idx > 0) this.idx--; }
                else if(s===2) {
                    if(this.zone===3) { if(d===2) this.exitFull(); return; }
                    if(this.zone===0) { var max = document.getElementById('cat-list').children.length-1; if(d===1 && this.idx<max) this.idx++; if(d===0 && this.idx>0) this.idx--; if(d===3 && App.fullData.length>0) { this.zone=2; this.idx=0; } }
                    else if(this.zone===2) { 
                        var dataLen = App.fullData.length;
                        if(d===1 && this.idx < dataLen - 1) this.idx++; 
                        else if(d===0) { if(this.idx > 0) this.idx--; else this.zone = 1; } 
                        else if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } 
                        else if(d===3) { this.zone=3; }
                    } else if(this.zone===1) { if(d===1) { this.zone=2; this.idx=0; } if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } }
                }
                this.updateFocus();
            },

            enter: function() {
                var currentScr = this.scr; 
                if(currentScr===0) { if(this.idx === 3) this.login(false); else if(this.idx < 3) this.move(1); }
                else if(currentScr===3) { if(this.idx === 0) this.toggleCfg('filter'); else if(this.idx === 1) this.toggleFormat(); else if(this.idx === 2) this.closeSettings(); else if(this.idx === 3) this.logout(); }
                else if(currentScr===2) { if(this.zone===0) this.loadContent(this.idx); else if(this.zone===1) this.doSearch(); else if(this.zone===2) this.clickItem(); else if(this.zone===3) this.toggleFull(); }
            }
        };

        document.addEventListener('keydown', function(e) {
            var k = e.keyCode;
            var isLeft = (k===37), isUp = (k===38), isRight = (k===39), isDown = (k===40), isEnter = (k===13 || k===295), isBack = (k===8 || k===27 || k===461 || k===10009); 
            var isRed = (k===403 || k===82), isGreen = (k===404 || k===71), isYellow = (k===405 || k===89), isBlue = (k===406 || k===66); 
            var isChUp = (k===427 || k===33), isChDown = (k===428 || k===34); 

            if(document.activeElement && document.activeElement.tagName === 'INPUT' && App.scr === 0) { if(isEnter || isDown) { e.preventDefault(); App.move(1); return; } if(isUp) { e.preventDefault(); App.move(0); return; } return; }
            if(App.scr === 2 && document.activeElement && document.activeElement.tagName === 'INPUT') { if(isEnter) { App.doSearch(); return; } if(isDown) { e.preventDefault(); App.zone=2; App.idx=0; App.updateFocus(); return; } return; }
            
            if(App.scr === 2) {
                if(isChUp) { e.preventDefault(); App.switchChannel(-1); return; }
                if(isChDown) { e.preventDefault(); App.switchChannel(1); return; }
            }

            if(k===48 || k===96) { if(App.scr===2 && App.zone===2) { var it=App.fullData[App.idx]; if(it) { FavManager.toggle(it.stream_id || it.id); } } }
            
            var isFull = document.getElementById('vid-box').classList.contains('fs');
            if(isFull) { e.preventDefault(); if(isRed || isBack || isEnter) { App.exitFull(); return; } return; }
            
            if(isLeft) { e.preventDefault(); App.move(2); } if(isUp) { e.preventDefault(); App.move(0); } if(isRight) { e.preventDefault(); App.move(3); } if(isDown) { e.preventDefault(); App.move(1); }
            if(isEnter) { e.preventDefault(); App.enter(); } 
            if(isBack) { e.preventDefault(); if(App.scr===3) { App.closeSettings(); } else if(App.scr===2 && App.zone>0) { App.zone=0; App.idx=(App.lastCatIdx > -1 ? App.lastCatIdx : 0); App.updateFocus(); } }
            
            if(isRed) { e.preventDefault(); if(App.scr===2) App.toggleFull(); }
            if(isGreen) { e.preventDefault(); if(App.scr===2) { App.zone=0; App.idx=0; App.updateFocus(); } }
            if(isYellow) { e.preventDefault(); if(App.scr===2) { App.zone=1; App.updateFocus(); } }
            if(isBlue) { e.preventDefault(); if(App.scr===2) App.openSettings(); } 
        });
    </script>
</body>
</html>
